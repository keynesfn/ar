<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">


<title>
Jornada Empreendedora AR
</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>



<style>


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:#000;

}


/* -------------------
TELA INICIAL
------------------- */


#inicio{

position:fixed;

inset:0;

z-index:99999;


background:

linear-gradient(
160deg,
#04122d,
#063970,
#ffb703
);



display:flex;

flex-direction:column;

align-items:center;

justify-content:center;


text-align:center;

color:white;

padding:30px;

}



#inicio h1{

font-size:36px;

}



#inicio p{

font-size:20px;

}



#start{

margin-top:30px;


padding:20px 50px;


border:none;


border-radius:50px;


background:#00ff99;


font-size:22px;


font-weight:bold;


}





/* -------------------
HUD
------------------- */


#hud{

display:none;

}



#progresso{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);


background:#000000aa;


color:white;


padding:15px 30px;


border-radius:30px;


font-size:18px;


z-index:9999;

}




#inventario{

position:fixed;


top:90px;

right:15px;


background:#000000aa;


border:3px solid #ffd000;


color:white;


padding:15px;


border-radius:25px;


font-size:32px;


text-align:center;


z-index:9999;

}







#card{

position:fixed;


bottom:40px;


left:50%;


transform:translateX(-50%);


width:85%;


background:#000000dd;


color:white;


padding:25px;


border-radius:30px;


text-align:center;


display:none;


z-index:9999;


}



#icone{

font-size:80px;

}



canvas,
.a-canvas,
a-scene{

background:transparent!important;

}


</style>

</head>



<body>




<!-- INICIO -->


<div id="inicio">


<h1>

🚀 Jornada Empreendedora

</h1>


<p>

Explore o ambiente e encontre os 5 artefatos escondidos.

</p>



<p>

🧭 💎 🚀 💡 👑

</p>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>








<!-- HUD -->


<div id="hud">


<div id="progresso">

🚀 0/5 habilidades

</div>



<div id="inventario">

🎒


<div id="slots">


⬜<br>

⬜<br>

⬜<br>

⬜<br>

⬜


</div>


</div>




<div id="card">


<div id="icone"></div>


<h2 id="mensagem"></h2>



</div>




</div>









<!-- AR -->


<a-scene


id="scene"


embedded


mindar-image="

imageTargetSrc: ./targets.mind;

autoStart:false;

filterMinCF:0.01;

filterBeta:10;

"


renderer="

alpha:true;

antialias:false;

colorManagement:true

"



vr-mode-ui="enabled:false"



device-orientation-permission-ui="enabled:false"


>





<a-camera

look-controls="enabled:false">


<a-cursor

raycaster="objects:.clicavel"

fuse="false">


</a-cursor>


</a-camera>









<!-- BUSSOLA -->


<a-entity id="item0" mindar-image-target="targetIndex:0">


<a-gltf-model

class="clicavel"

src="modelos/bussola.glb"

scale=".5 .5 .5"


animation="
property:rotation;
to:0 360 0;
loop:true;
dur:4000"


animation__float="
property:position;
to:0 .25 0;
dir:alternate;
loop:true;
dur:800"


onclick="capturar(0)"

>


</a-gltf-model>


</a-entity>







<!-- CRISTAL -->


<a-entity id="item1" mindar-image-target="targetIndex:1">


<a-gltf-model

class="clicavel"

src="modelos/cristal.glb"

scale=".5 .5 .5"


animation="
property:rotation;
to:0 360 0;
loop:true;
dur:4000"


animation__float="
property:position;
to:0 .25 0;
dir:alternate;
loop:true;
dur:800"


onclick="capturar(1)"

>


</a-gltf-model>


</a-entity>









<!-- FOGUETE -->


<a-entity id="item2" mindar-image-target="targetIndex:2">


<a-gltf-model

class="clicavel"

src="modelos/foguete.glb"

scale=".4 .4 .4"


animation="
property:rotation;
to:0 360 0;
loop:true;
dur:4000"


animation__float="
property:position;
to:0 .3 0;
dir:alternate;
loop:true;
dur:800"


onclick="capturar(2)"

>


</a-gltf-model>


</a-entity>









<!-- LAMPADA -->


<a-entity id="item3" mindar-image-target="targetIndex:3">


<a-gltf-model

class="clicavel"

src="modelos/lampada.glb"

scale=".5 .5 .5"


animation="
property:rotation;
to:0 360 0;
loop:true;
dur:4000"


animation__float="
property:position;
to:0 .25 0;
dir:alternate;
loop:true;
dur:800"


onclick="capturar(3)"

>


</a-gltf-model>


</a-entity>









<!-- COROA -->


<a-entity id="item4" mindar-image-target="targetIndex:4">


<a-gltf-model

class="clicavel"

src="modelos/coroa.glb"

scale=".5 .5 .5"


animation="
property:rotation;
to:0 360 0;
loop:true;
dur:4000"


animation__float="
property:position;
to:0 .25 0;
dir:alternate;
loop:true;
dur:800"


onclick="capturar(4)"

>


</a-gltf-model>


</a-entity>







</a-scene>








<script>


const itens=[


["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💎"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]


];




let capturados=[];





start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



await scene.systems[

"mindar-image-system"

].start();


};








function capturar(id){



if(

capturados.includes(id)

)

return;




capturados.push(id);




icone.innerHTML=

itens[id][1];



mensagem.innerHTML=

"🎉 Você capturou<br>"+

itens[id][0];



card.style.display="block";



setTimeout(()=>{


card.style.display="none";


},2000);





atualizar();





if(capturados.length===5){



setTimeout(()=>{


card.style.display="block";


icone.innerHTML="🏆";



mensagem.innerHTML=

"Parabéns!<br>Você completou sua Jornada Empreendedora 🚀";


},2500);



}



}









function atualizar(){



let html="";



itens.forEach((x,i)=>{


html +=

capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;



progresso.innerHTML=

"🚀 "+capturados.length+"/5 habilidades";



}




</script>


</body>

</html>
