<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">


<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>


*{

box-sizing:border-box;

}


html,body{

margin:0;

padding:0;

width:100%;

height:100%;

overflow:hidden;

background:#000;

font-family:Arial;

}


/* ===================
   VIDEO INTRO
=================== */


#intro{

position:fixed;

inset:0;

background:#000;

z-index:99999;

display:flex;

justify-content:center;

align-items:center;

}



#introVideo{

position:fixed;

top:0;

left:0;

width:100vw;

height:100vh;

object-fit:cover;

}




#btnStart{

position:absolute;

bottom:60px;

padding:20px 45px;

border:none;

border-radius:50px;

font-size:22px;

font-weight:bold;

background:#ffcc00;

box-shadow:0 0 30px #ffcc00;

}




/* ===================
   MINDAR CAMERA
=================== */


.a-canvas{

position:fixed!important;

top:0!important;

left:0!important;

width:100%!important;

height:100%!important;

}



/* vídeo interno da câmera */

body > video{

position:absolute!important;

top:0!important;

left:0!important;

width:100%!important;

height:100%!important;

object-fit:cover!important;

}



/* ===================
   HUD
=================== */


#hud{

display:none;

}



#progresso{

position:fixed;

top:20px;

left:20px;

z-index:9999;

background:rgba(0,0,0,.7);

color:white;

padding:15px 25px;

border-radius:30px;

font-size:18px;

}



#inventario{

position:fixed;

top:20px;

right:20px;

z-index:9999;

background:rgba(0,0,0,.7);

color:white;

padding:15px;

border-radius:25px;

text-align:center;

font-size:32px;

}



#scanner{

position:fixed;

inset:0;

display:none;

border:8px solid #00ff99;

animation:pulse 1s infinite;

z-index:8000;

pointer-events:none;

}


@keyframes pulse{

50%{

opacity:.3;

}

}



/* CARD */


#card{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:rgba(0,0,0,.85);

color:white;

padding:25px;

border-radius:30px;

text-align:center;

display:none;

z-index:9999;

}



#icone{

font-size:80px;

}



#capturar{

padding:18px 45px;

border:0;

border-radius:40px;

background:#00ff99;

font-size:22px;

font-weight:bold;

}


</style>

</head>



<body>


<!-- INTRO -->

<div id="intro">


<video

id="introVideo"

src="intro.mp4"

playsinline

webkit-playsinline>

</video>


<button id="btnStart">

▶️ Começar Jornada

</button>


</div>






<!-- HUD -->


<div id="hud">


<div id="scanner"></div>



<div id="progresso">

🚀 Jornada 0/5

</div>



<div id="inventario">


🎒


<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>


</div>




<div id="card">


<div id="icone"></div>


<h2 id="titulo"></h2>



<button id="capturar">

CAPTURAR ⭐

</button>


</div>


</div>







<!-- AR -->


<a-scene


id="scene"


embedded


style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
"


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>



<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>



<a-entity id="item0" mindar-image-target="targetIndex:0"></a-entity>


<a-entity id="item1" mindar-image-target="targetIndex:1"></a-entity>


<a-entity id="item2" mindar-image-target="targetIndex:2"></a-entity>


<a-entity id="item3" mindar-image-target="targetIndex:3"></a-entity>


<a-entity id="item4" mindar-image-target="targetIndex:4"></a-entity>



</a-scene>







<script>


const itens=[

["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💰"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]

];



let encontrado=null;

let capturados=[];


const scene=document.querySelector("#scene");





/* START */


btnStart.onclick=()=>{


btnStart.style.display="none";


introVideo.play();



introVideo.onended=async()=>{


intro.style.display="none";


hud.style.display="block";



try{


await scene.systems[

"mindar-image-system"

].start();



}

catch(e){


alert(

"Erro câmera: "+e

);


}



};



};







/* DETECTAR */


for(let i=0;i<5;i++){


let alvo=

document.querySelector("#item"+i);



alvo.addEventListener(

"targetFound",

()=>{


if(

capturados.includes(i)

)

return;



encontrado=i;



scanner.style.display="block";


card.style.display="block";



icone.innerHTML=

itens[i][1];



titulo.innerHTML=

"✨ Encontrado<br>"+

itens[i][0];



if(navigator.vibrate){

navigator.vibrate(300);

}



});


}






/* CAPTURAR */


capturar.onclick=()=>{


if(

encontrado===null

)

return;



capturados.push(

encontrado

);



scanner.style.display="none";


card.style.display="none";



atualizar();



encontrado=null;




if(

capturados.length===5

){


setTimeout(()=>{


card.style.display="block";


icone.innerHTML="🏆";


titulo.innerHTML=

"Parabéns!<br>Você completou a Jornada Empreendedora 🚀";


capturar.style.display="none";


},1000);



}


};






function atualizar(){


let html="";


itens.forEach(

(item,i)=>{


html+=

capturados.includes(i)

?

item[1]+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;



progresso.innerHTML=

"🚀 Jornada "+capturados.length+"/5";


}



</script>


</body>

</html>
