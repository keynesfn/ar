<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:#000;

}


/* INICIO */


#inicio{

position:fixed;

inset:0;

z-index:99999;

background:
linear-gradient(
150deg,
#06152f,
#123c69,
#ffb703
);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:30px;

}


#inicio h1{

font-size:34px;

}


#inicio p{

font-size:20px;

}



#start{

padding:20px 50px;

border:0;

border-radius:50px;

background:#00ff99;

font-size:22px;

font-weight:bold;

}




/* HUD */


#hud{

display:none;

}



#progresso{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#000000aa;

color:white;

padding:15px 30px;

border-radius:30px;

z-index:9999;

}



#inventario{

position:fixed;

right:15px;

top:90px;

background:#000000aa;

border:3px solid gold;

color:white;

padding:15px;

border-radius:25px;

font-size:32px;

z-index:9999;

text-align:center;

}




#alerta{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000000dd;

color:white;

border-radius:30px;

padding:25px;

display:none;

text-align:center;

font-size:24px;

z-index:9999;

}



#icone{

font-size:90px;

}



canvas,
.a-canvas,
a-scene{

background:transparent!important;

}


</style>


</head>


<body>



<div id="inicio">


<h1>

🚀 Jornada Empreendedora

</h1>


<p>

Encontre os 5 artefatos escondidos pelo ambiente

</p>



<p>

🧭 💎 🚀 💡 👑

</p>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>






<div id="hud">


<div id="progresso">

🚀 0/5 habilidades

</div>



<div id="inventario">


🎒


<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>


</div>




<div id="alerta">


<div id="icone"></div>


<div id="texto"></div>


</div>



</div>






<a-scene

id="scene"

embedded


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
filterMinCF:0.01;
filterBeta:10;
"


renderer="
alpha:true;
antialias:false;
colorManagement:true;
"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>



<a-camera look-controls="enabled:false">


<a-cursor

raycaster="objects:.clicavel"

fuse="false">

</a-cursor>


</a-camera>





<!-- MODELO PADRAO -->


<a-entity id="item0" mindar-image-target="targetIndex:0">

<a-gltf-model

class="clicavel"

src="modelos/bussola.glb"

position="0 0 0.3"

scale="3 3 3"

animation="
property:rotation;
to:0 360 0;
loop:true;
dur:5000"

animation__float="
property:position;
from:0 -0.1 0.3;
to:0 0.3 0.3;
dir:alternate;
loop:true;
dur:900"

onclick="capturar(0)">

</a-gltf-model>

</a-entity>






<a-entity id="item1" mindar-image-target="targetIndex:1">

<a-gltf-model

class="clicavel"

src="modelos/cristal.glb"

position="0 0 0.3"

scale="3 3 3"

animation="property:rotation;to:0 360 0;loop:true;dur:5000"

animation__float="property:position;to:0 .3 .3;dir:alternate;loop:true"

onclick="capturar(1)">

</a-gltf-model>

</a-entity>







<a-entity id="item2" mindar-image-target="targetIndex:2">

<a-gltf-model

class="clicavel"

src="modelos/foguete.glb"

position="0 0 0.3"

scale="3 3 3"

animation="property:rotation;to:0 360 0;loop:true;dur:5000"

animation__float="property:position;to:0 .3 .3;dir:alternate;loop:true"

onclick="capturar(2)">

</a-gltf-model>

</a-entity>








<a-entity id="item3" mindar-image-target="targetIndex:3">

<a-gltf-model

class="clicavel"

src="modelos/lampada.glb"

position="0 0 0.3"

scale="3 3 3"

animation="property:rotation;to:0 360 0;loop:true;dur:5000"

animation__float="property:position;to:0 .3 .3;dir:alternate;loop:true"

onclick="capturar(3)">

</a-gltf-model>

</a-entity>







<a-entity id="item4" mindar-image-target="targetIndex:4">

<a-gltf-model

class="clicavel"

src="modelos/coroa.glb"

position="0 0 0.3"

scale="3 3 3"

animation="property:rotation;to:0 360 0;loop:true;dur:5000"

animation__float="property:position;to:0 .3 .3;dir:alternate;loop:true"

onclick="capturar(4)">

</a-gltf-model>

</a-entity>




</a-scene>





<script>


const itens=[

["Bússola da Estratégia","🧭"],
["Cristal Financeiro","💎"],
["Foguete das Vendas","🚀"],
["Lâmpada da Inovação","💡"],
["Coroa da Liderança","👑"]

];



let capturados=[];



start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";


await scene.systems["mindar-image-system"].start();


};





function capturar(id){



if(capturados.includes(id))

return;




capturados.push(id);



icone.innerHTML=itens[id][1];


texto.innerHTML=

"🎉 Você conquistou<br><b>"+

itens[id][0]+

"</b>";



alerta.style.display="block";



setTimeout(()=>{

alerta.style.display="none";

},2000);



atualizar();




if(capturados.length===5){



setTimeout(()=>{


icone.innerHTML="🏆";


texto.innerHTML=

"Parabéns!<br>Você completou sua Jornada Empreendedora 🚀";


alerta.style.display="block";


},2500);



}



}





function atualizar(){


let html="";


itens.forEach((x,i)=>{


html +=

capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";

});


slots.innerHTML=html;


progresso.innerHTML=

"🚀 "+capturados.length+"/5 habilidades";


}



</script>


</body>

</html>
