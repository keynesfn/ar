<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">


<title>Jornada Empreendedora AR</title>


<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>


<style>


html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
background:black;

}


/* CAMERA */


#camera{

position:fixed;
inset:0;

width:100%;
height:100%;

object-fit:cover;

z-index:1;

}



/* INICIO */


#inicio{

position:fixed;
inset:0;

background:
linear-gradient(140deg,#06142e,#005f73,#ffb703);

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

color:white;

padding:30px;

z-index:100;

}



#inicio h1{

font-size:36px;

}



#start{

padding:20px 50px;

border:0;

border-radius:50px;

font-size:22px;

background:#00ff99;

font-weight:bold;

}




/* HUD */


#hud{

display:none;

}



#status{

position:fixed;

top:25px;

left:50%;

transform:translateX(-50%);

background:#000a;

color:white;

padding:15px 30px;

border-radius:30px;

z-index:20;

}





#inventario{

position:fixed;

right:15px;
top:90px;

background:#000a;

border:3px solid gold;

color:white;

padding:15px;

font-size:32px;

border-radius:25px;

z-index:20;

text-align:center;

}







/* RADAR */


#scanner{


position:fixed;

top:50%;
left:50%;

width:260px;
height:260px;

margin-left:-130px;
margin-top:-130px;

border-radius:50%;

border:3px solid #00ff99;

background:

radial-gradient(
circle,
rgba(0,255,150,.25),
transparent 70%
);


box-shadow:0 0 40px #00ff99;

overflow:hidden;

display:none;

z-index:15;

}



#scanner:after{

content:"";

position:absolute;

width:50%;
height:50%;

left:50%;
top:0;

background:

linear-gradient(
90deg,
#00ff99,
transparent
);


transform-origin:0% 100%;

animation:girar 2s linear infinite;

}


@keyframes girar{


from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}







/* OBJETO */


#objeto{

position:fixed;

width:260px;
height:260px;

display:none;

z-index:30;

filter:
drop-shadow(0 0 30px #00ff99);

}





#mensagem{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000c;

color:white;

padding:25px;

border-radius:30px;

font-size:22px;

text-align:center;

display:none;

z-index:40;

}




/* VIDEO */


#playerVideo{

position:fixed;

inset:0;

background:black;

display:none;

z-index:999;

}


#videoSkill{

width:100%;
height:100%;

object-fit:cover;

}


</style>

</head>



<body>


<video
id="camera"
autoplay
playsinline>
</video>





<div id="inicio">


<h1>🚀 Jornada Empreendedora</h1>


<p>
Explore o ambiente para encontrar habilidades
</p>


<h2>🧭 💰 🚀 💡 👑</h2>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>





<div id="hud">


<div id="status">

🟢 Preparando...

</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>


<div id="scanner"></div>


</div>





<model-viewer

id="objeto"

auto-rotate>

</model-viewer>





<div id="mensagem"></div>






<div id="playerVideo">


<video

id="videoSkill"

playsinline

controls>

</video>


</div>







<script>


const itens=[

{
nome:"Gestão Financeira",
icone:"💰",
modelo:"modelos/dotum.glb",
video:"video1.mp4"
},

{
nome:"Clientes e Mercado",
icone:"🎯",
modelo:"modelos/sicoob.glb",
video:"video2.mp4"
},

{
nome:"Vendas",
icone:"🚀",
modelo:"modelos/sebrae.glb",
video:"video3.mp4"
},

{
nome:"Inovação",
icone:"💡",
modelo:"modelos/dotum.glb",
video:"video4.mp4"
},

{
nome:"Crescimento",
icone:"👑",
modelo:"modelos/sicoob.glb",
video:"video5.mp4"
}

];




let atual=0;

let capturados=[];

let movimento=false;







start.onclick=async()=>{


inicio.style.display="none";

hud.style.display="block";



await liberarMovimento();



let stream=

await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

});


camera.srcObject=stream;



buscar();


};








async function liberarMovimento(){


if(
typeof DeviceMotionEvent!="undefined" &&
typeof DeviceMotionEvent.requestPermission=="function"
){

await DeviceMotionEvent.requestPermission();

}



window.addEventListener(

"devicemotion",

(e)=>{


let acc=e.accelerationIncludingGravity;


if(!acc)return;



let força=

Math.abs(acc.x)+
Math.abs(acc.y)+
Math.abs(acc.z);



if(força>18){


movimento=true;


}


});


}









function buscar(){



scanner.style.display="block";



movimento=false;



if(atual===0){


// primeiro item libera direto

aguardarTempo();


}

else{


status.innerHTML=

"🚶 Continue caminhando...";



let check=setInterval(()=>{



if(movimento){


clearInterval(check);


aguardarTempo();


}



},500);



}



}









function aguardarTempo(){



status.innerHTML=

"🟢 Buscando habilidades...";



let tempo=

Math.floor(Math.random()*8)+8;



setTimeout(()=>{


mostrarObjeto();


},tempo*1000);



}










function mostrarObjeto(){



scanner.style.display="none";



let item=itens[atual];



objeto.src=item.modelo;



objeto.style.display="block";



objeto.style.left=

Math.random()*50+20+"%";


objeto.style.top=

Math.random()*35+20+"%";



status.innerHTML=

"✨ Encontrado!";



mensagem.innerHTML=

"Toque para capturar";



mensagem.style.display="block";


navigator.vibrate?.(300);



}










objeto.onclick=()=>{



let item=itens[atual];



objeto.style.display="none";


mensagem.style.display="none";



capturados.push(item);



atualizar();



abrirVideo(item.video);



};








function abrirVideo(video){


playerVideo.style.display="block";


videoSkill.src=video;


videoSkill.play();



videoSkill.onended=()=>{


playerVideo.style.display="none";


atual++;



if(atual>=5)

fim();

else

buscar();



};



}








function atualizar(){


let html="";



itens.forEach(i=>{


html+=capturados.includes(i)

?

i.icone+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;


}









function fim(){


status.innerHTML="🏆 Jornada concluída";


mensagem.innerHTML=

"Parabéns! Você conquistou todas as habilidades 🚀";



mensagem.style.display="block";


}


</script>


</body>

</html>
