<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">


<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>



<style>


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

font-family:Arial;

}



/* força câmera */


video,
canvas,
.a-canvas{


position:fixed!important;


top:0!important;

left:0!important;


width:100vw!important;


height:100vh!important;


object-fit:cover!important;

}






/* INTRO */


#intro{


position:fixed;

inset:0;


background:#000;


z-index:99999;


display:flex;


align-items:center;


justify-content:center;


}



#introVideo{


width:100%;

height:100%;

object-fit:cover;


}





#btnStart{


position:absolute;

bottom:60px;


padding:20px 40px;


border-radius:50px;


border:none;


background:#ffcc00;


font-size:22px;


font-weight:bold;


}






/* HUD */


#hud{


display:none;


}




#progresso{


position:fixed;


top:20px;

left:20px;


background:

rgba(0,0,0,.7);



color:white;


padding:15px 25px;


border-radius:30px;


z-index:9999;


}





#inventario{


position:fixed;


right:20px;

top:20px;



background:

rgba(0,0,0,.7);


color:white;


padding:15px;


border-radius:20px;


font-size:32px;


text-align:center;


z-index:9999;


}





#scanner{


position:fixed;


inset:0;


border:8px solid #00ff99;


display:none;


z-index:999;


animation:pulse 1s infinite;


pointer-events:none;


}



@keyframes pulse{


50%{

opacity:.3;

}


}






#card{


position:fixed;


bottom:40px;


left:50%;


transform:

translateX(-50%);



width:85%;



background:

rgba(0,0,0,.85);



color:white;


padding:25px;



border-radius:30px;


text-align:center;


z-index:9999;


display:none;


}





#icone{


font-size:80px;


}




#capturar{


padding:18px 45px;


border-radius:40px;


border:none;


font-size:22px;


background:#00ff99;


font-weight:bold;


}





</style>

</head>



<body>





<!-- INTRO -->


<div id="intro">



<video

id="introVideo"

src="intro.mp4"

playsinline

webkit-playsinline>

</video>




<button id="btnStart">

▶️ Começar Jornada

</button>



</div>









<div id="hud">



<div id="scanner"></div>



<div id="progresso">

🚀 Jornada 0/5

</div>





<div id="inventario">


🎒


<div id="slots">


⬜<br>

⬜<br>

⬜<br>

⬜<br>

⬜


</div>


</div>






<div id="card">



<div id="icone"></div>



<h2 id="titulo"></h2>




<button id="capturar">


CAPTURAR ⭐


</button>



</div>





</div>









<a-scene


id="scene"


embedded


mindar-image="

imageTargetSrc: ./targets.mind;

autoStart:false;

filterMinCF:0.0001;

filterBeta:0.001;

"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"


>





<a-camera

look-controls="enabled:false">


</a-camera>






<a-entity

id="item0"

mindar-image-target="targetIndex:0">

</a-entity>




<a-entity

id="item1"

mindar-image-target="targetIndex:1">

</a-entity>




<a-entity

id="item2"

mindar-image-target="targetIndex:2">

</a-entity>





<a-entity

id="item3"

mindar-image-target="targetIndex:3">

</a-entity>




<a-entity

id="item4"

mindar-image-target="targetIndex:4">

</a-entity>






</a-scene>











<script>




const itens=[


["Bússola da Estratégia","🧭"],


["Cristal Financeiro","💰"],


["Foguete das Vendas","🚀"],


["Lâmpada da Inovação","💡"],


["Coroa da Liderança","👑"]


];






let encontrado=null;


let capturados=[];





const ar =

document.querySelector("#scene");






/* INICIO */


btnStart.onclick = async()=>{



btnStart.style.display="none";




/* começa AR no clique */


try{


await ar.systems[

"mindar-image-system"

].start();



console.log(

"AR iniciado"

);



}

catch(e){



alert(

"Erro câmera: "+e.message

);



}





/* toca vídeo */


introVideo.play();




introVideo.onended=()=>{



intro.style.display="none";



hud.style.display="block";



};



};









/* DETECTA */


for(let i=0;i<5;i++){



document

.querySelector("#item"+i)


.addEventListener(


"targetFound",


()=>{



if(

capturados.includes(i)

)

return;





encontrado=i;




scanner.style.display="block";



icone.innerHTML=

itens[i][1];



titulo.innerHTML=

"✨ Encontrado<br>"+

itens[i][0];




card.style.display="block";



if(

navigator.vibrate

)

navigator.vibrate(300);



});




}









capturar.onclick=()=>{



if(

encontrado===null

)

return;




capturados.push(

encontrado

);





scanner.style.display="none";


card.style.display="none";




atualizar();




encontrado=null;





if(

capturados.length===5

){



setTimeout(()=>{



card.style.display="block";



icone.innerHTML="🏆";



titulo.innerHTML=

"Jornada Completa!<br>Você desbloqueou seu potencial empreendedor 🚀";



capturar.style.display="none";



},1000);



}



};









function atualizar(){



let html="";




itens.forEach((i,index)=>{



html +=

capturados.includes(index)

?

i[1]+"<br>"

:

"⬜<br>";



});




slots.innerHTML=html;



progresso.innerHTML=

"🚀 Jornada "+capturados.length+"/5";



}




</script>



</body>


</html>
