<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script type="module"
src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js">
</script>


<style>


html,body{

margin:0;

width:100%;

height:100%;

overflow:hidden;

font-family:Arial;

background:black;

}


/* CAMERA */


#camera{

position:fixed;

inset:0;

width:100%;

height:100%;

object-fit:cover;

z-index:1;

}


/* INICIO */


#inicio{

position:fixed;

inset:0;

background:

linear-gradient(
140deg,
#06142e,
#005f73,
#ffb703
);


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:30px;

z-index:100;

}


#start{

padding:20px 50px;

border:0;

border-radius:50px;

font-size:22px;

background:#00ff99;

font-weight:bold;

}


/* HUD */


#hud{

display:none;

}


#status{

position:fixed;

top:25px;

left:50%;

transform:translateX(-50%);

background:#000a;

color:white;

padding:15px 30px;

border-radius:30px;

z-index:20;

text-align:center;

}



/* INVENTARIO */


#inventario{

position:fixed;

right:15px;

top:90px;

background:#000a;

border:3px solid gold;

color:white;

font-size:32px;

padding:15px;

border-radius:25px;

z-index:20;

}



/* RADAR */


#scanner{

position:fixed;

top:50%;

left:50%;

width:260px;

height:260px;

margin-left:-130px;

margin-top:-130px;

border-radius:50%;

border:3px solid #00ff99;

background:

radial-gradient(
circle,
rgba(0,255,150,.25),
transparent 70%
);


box-shadow:0 0 40px #00ff99;

overflow:hidden;

display:none;

z-index:15;

}


#scanner:after{

content:"";

position:absolute;

width:50%;

height:50%;

left:50%;

top:0;


background:

linear-gradient(
90deg,
#00ff99,
transparent
);


transform-origin:0% 100%;

animation:girar 2s linear infinite;

}



@keyframes girar{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}


/* OBJETO */


#objeto{

position:fixed;

left:50%;

top:45%;

transform:translate(-50%,-50%);

width:280px;

height:280px;

display:none;

z-index:30;

filter:

drop-shadow(0 0 35px #00ff99);

}



/* MENSAGEM */


#mensagem{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000c;

color:white;

padding:25px;

border-radius:30px;

text-align:center;

font-size:22px;

display:none;

z-index:40;

}



/* VIDEO */


#playerVideo{

position:fixed;

inset:0;

background:black;

display:none;

z-index:999;

}


#videoSkill{

width:100%;

height:100%;

object-fit:cover;

}


/* DEBUG */


#debug{

position:fixed;

left:10px;

bottom:10px;

background:#000c;

color:#00ff99;

font-family:monospace;

font-size:13px;

padding:10px;

border-radius:10px;

z-index:99999;

line-height:20px;

}


</style>

  </head>


<body>


<!-- CAMERA -->

<video
id="camera"
autoplay
playsinline>
</video>



<!-- INICIO -->

<div id="inicio">

<h1>
🚀 Jornada Empreendedora
</h1>

<p>
Explore o ambiente, caminhe e encontre habilidades escondidas
</p>


<button id="start">
COMEÇAR MISSÃO
</button>


</div>





<!-- HUD -->

<div id="hud">


<div id="status">
Preparando...
</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>


<div id="scanner"></div>


</div>





<!-- OBJETO 3D -->


<model-viewer

id="objeto"

auto-rotate

rotation-per-second="25deg"

interaction-prompt="none"

disable-zoom>

</model-viewer>





<div id="mensagem"></div>






<!-- VIDEO -->

<div id="playerVideo">


<video

id="videoSkill"

playsinline

controls>

</video>


</div>






<!-- DEBUG -->

<div id="debug">

DEBUG

</div>








<script>


const itens=[


{
nome:"Gestão Financeira",
icone:"💰",
modelo:"modelos/dotum.glb",
video:"video1.mp4"
},


{
nome:"Clientes e Mercado",
icone:"🎯",
modelo:"modelos/sicoob.glb",
video:"video2.mp4"
},


{
nome:"Vendas",
icone:"🚀",
modelo:"modelos/sebrae.glb",
video:"video3.mp4"
},


{
nome:"Inovação",
icone:"💡",
modelo:"modelos/dotum.glb",
video:"video4.mp4"
},


{
nome:"Crescimento",
icone:"👑",
modelo:"modelos/sicoob.glb",
video:"video5.mp4"
}


];




// CONTROLES


let atual=0;

let capturados=[];



// passos

let passos=0;

let metaPassos=0;

let ultimoPasso=0;

let aguardando=false;



// movimento

let ultimaForca=0;



// bussola

let anguloAtual=0;

let anguloItem=null;

let itemAtivo=false;



let inicioBusca=0;









// INICIAR


start.onclick=async()=>{


inicio.style.display="none";

hud.style.display="block";



await sensores();



let stream =

await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment"

},

audio:false

});



camera.srcObject=stream;



buscar();



};









// SENSORES


async function sensores(){



// IOS


if(

typeof DeviceMotionEvent!="undefined"

&&

typeof DeviceMotionEvent.requestPermission=="function"

){


await DeviceMotionEvent.requestPermission();


}




if(

typeof DeviceOrientationEvent!="undefined"

&&

typeof DeviceOrientationEvent.requestPermission=="function"

){


await DeviceOrientationEvent.requestPermission();


}







// PASSOS


window.addEventListener(

"devicemotion",

(e)=>{



if(!aguardando)

return;



let acc=

e.accelerationIncludingGravity;



if(!acc)

return;




let forca=

Math.sqrt(

acc.x*acc.x+

acc.y*acc.y+

acc.z*acc.z

);



let impacto=

Math.abs(forca-9.8);



ultimaForca=impacto;



let agora=Date.now();




if(

impacto>1.8 &&

agora-ultimoPasso>500

){



ultimoPasso=agora;



passos++;



if(passos>=metaPassos){



aguardando=false;



mostrarObjeto();



}



}



}

);









// GIROSCOPIO


window.addEventListener(

"deviceorientation",

(e)=>{


if(e.alpha!==null){



anguloAtual=e.alpha;



verificarOlhar();



}



}

);



}










// BUSCA


function buscar(){



scanner.style.display="block";


mensagem.style.display="none";


objeto.style.display="none";



itemAtivo=false;



inicioBusca=Date.now();



passos=0;



metaPassos=

Math.floor(

Math.random()*8

)+8;



aguardando=true;




status.innerHTML=

"🚶 Caminhe para procurar";


}











// APARECE ITEM


function mostrarObjeto(){



scanner.style.display="none";



let item=itens[atual];



objeto.src=item.modelo;



// salva direção atual


anguloItem=anguloAtual;



itemAtivo=true;




status.innerHTML=

"✨ Energia detectada";



mensagem.innerHTML=

"Olhe ao redor para encontrar o artefato";


mensagem.style.display="block";



navigator.vibrate?.(300);



}









// VERIFICAR DIREÇÃO


function verificarOlhar(){



if(!itemAtivo)

return;



let diferenca=

Math.abs(

anguloAtual-

anguloItem

);



// ajuste circular 360 graus

if(diferenca>180)

diferenca=360-diferenca;




if(diferenca<18){



objeto.style.display="block";



mensagem.innerHTML=

"✨ Encontrado!<br>Toque para capturar";



}

else{



objeto.style.display="none";



mensagem.innerHTML=

"🔎 Continue procurando...";



}



}










// CAPTURA


objeto.onclick=()=>{



if(!itemAtivo)

return;




let item=itens[atual];



capturados.push(item);



itemAtivo=false;



objeto.style.display="none";


mensagem.style.display="none";



atualizar();



abrirVideo(item.video);



};









// VIDEO


function abrirVideo(v){



playerVideo.style.display="block";


videoSkill.src=v;



videoSkill.play();




videoSkill.onended=()=>{



playerVideo.style.display="none";



videoSkill.src="";



atual++;



if(atual>=itens.length){


fim();


}else{


buscar();


}



};



}









// INVENTARIO


function atualizar(){



let html="";



itens.forEach(i=>{


html +=

capturados.includes(i)

?

i.icone+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;



}










function fim(){


status.innerHTML=

"🏆 Jornada concluída";



mensagem.innerHTML=

"Parabéns! Você conquistou todas as habilidades 🚀";



mensagem.style.display="block";


}










// DEBUG


setInterval(()=>{


let tempo=

inicioBusca

?

Math.floor(

(Date.now()-inicioBusca)/1000

)

:

0;



debug.innerHTML=

"DEBUG<br>"+

"⏱ "+tempo+"s<br>"+

"👣 "+passos+"/"+metaPassos+"<br>"+

"📳 "+ultimaForca.toFixed(2)+"<br>"+

"🧭 Atual: "+Math.round(anguloAtual)+"°<br>"+

"🎯 Item: "+

(anguloItem!==null?

Math.round(anguloItem)+"°"

:

"-"

)

+"<br>"+

"🎁 "+(atual+1)+"/5";



},500);




</script>


</body>


</html>
