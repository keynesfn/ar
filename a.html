<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

}


/* ==================
TELA INICIAL
================== */


#inicio{

position:fixed;

inset:0;

z-index:99999;

background:
linear-gradient(160deg,#06142e,#102c57,#ffb703);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:30px;

}


#inicio h1{

font-size:34px;

}


#inicio p{

font-size:20px;

line-height:1.4;

}


#start{

margin-top:30px;

padding:20px 50px;

border:none;

border-radius:50px;

background:#00ff99;

font-size:22px;

font-weight:bold;

box-shadow:0 0 30px #00ff99;

}




/* HUD */


#hud{

display:none;

}


#missao{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#000000bb;

color:white;

padding:15px 30px;

border-radius:40px;

z-index:999;

font-size:18px;

}





#inventario{

position:fixed;

right:15px;

top:90px;

background:#000000aa;

border:3px solid #ffd000;

color:white;

padding:15px;

border-radius:25px;

font-size:32px;

text-align:center;

z-index:999;

}



/* CARD */


#card{

position:fixed;

bottom:35px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000000dd;

color:white;

border-radius:30px;

padding:25px;

display:none;

text-align:center;

z-index:999;

}


#icone{

font-size:90px;

}


#capturar{

padding:18px 45px;

border:0;

border-radius:50px;

background:#ffd000;

font-size:22px;

font-weight:bold;

}



canvas,
.a-canvas,
a-scene{

background:transparent!important;

}


</style>


</head>


<body>




<div id="inicio">


<h1>
🚀 Jornada Empreendedora
</h1>


<p>

Encontre os 5 artefatos escondidos pelo ambiente usando realidade aumentada.

</p>


<p>

🧭 💎 🚀 💡 👑

</p>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>







<div id="hud">


<div id="missao">

🚀 0/5 habilidades

</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>





<div id="card">


<div id="icone"></div>


<h2 id="titulo"></h2>



<button id="capturar">

PEGAR SKILL ⭐

</button>


</div>


</div>








<a-scene


id="scene"


embedded


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
"


renderer="
alpha:true;
antialias:false;
colorManagement:true;
"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>




<a-camera

look-controls="enabled:false">

</a-camera>







<a-entity id="item0" mindar-image-target="targetIndex:0">

<a-circle color="#ffd000" radius=".5"></a-circle>

<a-text value="🧭"
align="center"
scale="2 2 2">

</a-text>


</a-entity>





<a-entity id="item1" mindar-image-target="targetIndex:1">


<a-circle color="#00ff99" radius=".5"></a-circle>


<a-text value="💎"
align="center"
scale="2 2 2">

</a-text>


</a-entity>






<a-entity id="item2" mindar-image-target="targetIndex:2">


<a-circle color="#ff6600" radius=".5"></a-circle>


<a-text value="🚀"
align="center"
scale="2 2 2">

</a-text>


</a-entity>







<a-entity id="item3" mindar-image-target="targetIndex:3">


<a-circle color="#ffff00" radius=".5"></a-circle>


<a-text value="💡"
align="center"
scale="2 2 2">

</a-text>


</a-entity>







<a-entity id="item4" mindar-image-target="targetIndex:4">


<a-circle color="#cc00ff" radius=".5"></a-circle>


<a-text value="👑"
align="center"
scale="2 2 2">

</a-text>


</a-entity>





</a-scene>








<script>


const itens=[

["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💎"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]

];


let encontrado=null;

let capturados=[];




start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



await scene.systems[

"mindar-image-system"

].start();


};








for(let i=0;i<5;i++){


document.querySelector("#item"+i)


.addEventListener(

"targetFound",

()=>{


if(capturados.includes(i))

return;



encontrado=i;



icone.innerHTML=itens[i][1];


titulo.innerHTML=

"✨ Artefato encontrado<br>"+

itens[i][0];



card.style.display="block";



if(navigator.vibrate)

navigator.vibrate(300);



});


}








capturar.onclick=()=>{


if(encontrado===null)

return;




capturados.push(encontrado);



card.style.display="none";



atualizar();



if(capturados.length==5){



setTimeout(()=>{


icone.innerHTML="🏆";


titulo.innerHTML=

"Parabéns! Você completou a Jornada Empreendedora 🚀";


card.style.display="block";


capturar.style.display="none";


},800);


}



encontrado=null;


};








function atualizar(){



let html="";


itens.forEach((x,i)=>{


html +=

capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;



missao.innerHTML=

"🚀 "+capturados.length+"/5 habilidades";


}


</script>


</body>

</html>
