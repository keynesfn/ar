<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jornada Empreendedora AR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}


/* INTRO */


#intro{
position:fixed;
inset:0;
background:#000;
z-index:99999;
}


#introVideo{

width:100%;
height:100%;
object-fit:cover;

}


#btnStart{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
padding:20px 45px;
border:none;
border-radius:50px;
background:#ffcc00;
font-size:22px;
font-weight:bold;
box-shadow:0 0 30px #ffaa00;
}



/* HUD */
#hud{
display:none;
}


#topo{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:50;
background:#000000aa;
color:white;
padding:15px 30px;

border-radius:40px;

font-size:18px;

}



#inventario{

position:fixed;

right:20px;
top:90px;

z-index:50;

background:#000000aa;

color:white;

border:2px solid #ffd000;

padding:15px;

border-radius:25px;

font-size:32px;

text-align:center;

}




#card{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000000dd;

color:white;

padding:25px;

border-radius:30px;

text-align:center;

display:none;

z-index:100;

}


#iconeCard{

font-size:80px;

}


#capturar{

margin-top:15px;

padding:18px 40px;

border:none;

border-radius:40px;

background:#00ff99;

font-size:22px;

font-weight:bold;

}


</style>


</head>


<body>


<!-- INTRO -->


<div id="intro">

<video

id="introVideo"

src="intro.mp4"

playsinline

webkit-playsinline>

</video>


<button id="btnStart">

🚀 COMEÇAR

</button>


</div>






<!-- HUD -->


<div id="hud">


<div id="topo">

🚀 Jornada 0/5

</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>


</div>




<div id="card">


<div id="iconeCard"></div>


<h2 id="nomeCard"></h2>


<button id="capturar">

PEGAR SKILL ⭐

</button>


</div>


</div>








<!-- REALIDADE AUMENTADA -->


<a-scene

id="scene"

embedded

mindar-image="
imageTargetSrc: ./targets.mind;
filterMinCF:0.01;
filterBeta:10;
warmupTolerance:5;
missTolerance:5;
"


renderer="
alpha:true;
antialias:false;
precision:mediump;
colorManagement:true;
"


background="transparent"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

>



<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>






<!-- BÚSSOLA -->


<a-entity id="item0" mindar-image-target="targetIndex:0">


<a-circle

color="#FFD700"

radius=".45"

opacity=".6"

animation="
property:scale;
dir:alternate;
loop:true;
to:1.3 1.3 1.3;
dur:700">

</a-circle>



<a-text

value="🧭"

align="center"

position="0 0 .05"

scale="2 2 2">

</a-text>



<a-text

value="ESTRATEGIA"

align="center"

position="0 -.6 0"

color="white"

scale=".4 .4 .4">

</a-text>


</a-entity>







<!-- FINANCEIRO -->


<a-entity id="item1" mindar-image-target="targetIndex:1">


<a-circle color="#00ff99"
radius=".45"
opacity=".6"
animation="property:scale;dir:alternate;loop:true;to:1.3 1.3 1.3">

</a-circle>


<a-text value="💎"
align="center"
position="0 0 .05"
scale="2 2 2">

</a-text>


<a-text value="FINANCAS"
align="center"
position="0 -.6 0"
color="white"
scale=".4 .4 .4">

</a-text>


</a-entity>







<!-- VENDAS -->


<a-entity id="item2" mindar-image-target="targetIndex:2">


<a-circle color="#ff6600"
radius=".45"
opacity=".6"
animation="property:scale;dir:alternate;loop:true;to:1.3 1.3 1.3">

</a-circle>



<a-text value="🚀"
align="center"
position="0 0 .05"
scale="2 2 2">

</a-text>


<a-text value="VENDAS"
align="center"
position="0 -.6 0"
color="white"
scale=".4 .4 .4">

</a-text>


</a-entity>








<!-- INOVAÇÃO -->


<a-entity id="item3" mindar-image-target="targetIndex:3">


<a-circle color="#ffff00"
radius=".45"
opacity=".6"
animation="property:scale;dir:alternate;loop:true;to:1.3 1.3 1.3">

</a-circle>



<a-text value="💡"
align="center"
position="0 0 .05"
scale="2 2 2">

</a-text>


<a-text value="INOVACAO"
align="center"
position="0 -.6 0"
color="white"
scale=".4 .4 .4">

</a-text>


</a-entity>








<!-- LIDERANÇA -->


<a-entity id="item4" mindar-image-target="targetIndex:4">


<a-circle color="#cc00ff"
radius=".45"
opacity=".6"
animation="property:scale;dir:alternate;loop:true;to:1.3 1.3 1.3">

</a-circle>



<a-text value="👑"
align="center"
position="0 0 .05"
scale="2 2 2">

</a-text>


<a-text value="LIDERANCA"
align="center"
position="0 -.6 0"
color="white"
scale=".4 .4 .4">

</a-text>


</a-entity>




</a-scene>








<script>


const itens=[

["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💎"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]

];


let encontrado=null;

let capturados=[];





btnStart.onclick=()=>{


btnStart.style.display="none";


introVideo.play();



introVideo.onended=()=>{


intro.style.display="none";


hud.style.display="block";


};


};






for(let i=0;i<5;i++){


document.querySelector("#item"+i)

.addEventListener(

"targetFound",

()=>{


if(capturados.includes(i))

return;



encontrado=i;



iconeCard.innerHTML=itens[i][1];


nomeCard.innerHTML=

"✨ Encontrado<br>"+

itens[i][0];



card.style.display="block";



if(navigator.vibrate)

navigator.vibrate(300);



});



}







capturar.onclick=()=>{


if(encontrado===null)

return;




capturados.push(encontrado);



card.style.display="none";


atualizar();



encontrado=null;




if(capturados.length===5){



setTimeout(()=>{


card.style.display="block";


iconeCard.innerHTML="🏆";


nomeCard.innerHTML=

"Parabéns!<br>Você completou sua Jornada Empreendedora 🚀";


capturar.style.display="none";



},1000);


}


};








function atualizar(){



let html="";



itens.forEach((x,i)=>{


html +=

capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;



topo.innerHTML=

"🚀 Jornada "+capturados.length+"/5";


}


</script>


</body>

</html>
