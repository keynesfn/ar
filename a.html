<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:black;

}


/* INTRO */


#intro{

position:fixed;
inset:0;

background:black;

z-index:99999;

}


#introVideo{

width:100%;
height:100%;

object-fit:cover;

}


#btnStart{


position:absolute;

bottom:60px;
left:50%;

transform:translateX(-50%);


padding:20px 45px;


border:0;

border-radius:50px;


font-size:22px;

font-weight:bold;


background:

linear-gradient(
45deg,
#ffd000,
#ff8c00
);


box-shadow:

0 0 40px #ffaa00;


}



/* HUD */


#hud{

display:none;

}




#topo{

position:fixed;

top:15px;
left:50%;

transform:translateX(-50%);


background:

rgba(0,0,0,.65);


color:white;


padding:

15px 30px;


border-radius:40px;


z-index:50;


font-size:18px;


backdrop-filter:blur(10px);

}







#inventario{

position:fixed;

right:15px;

top:90px;


background:

rgba(0,0,0,.7);


border:

2px solid #ffd000;



border-radius:25px;



padding:15px;


z-index:50;



text-align:center;


color:white;


font-size:30px;


}





#scanner{


position:fixed;


inset:0;


display:none;


z-index:20;


pointer-events:none;


}




#scanner:after{


content:"";


position:absolute;


top:50%;

left:50%;


width:220px;

height:220px;


transform:

translate(-50%,-50%);



border:

6px solid #00ff99;


border-radius:50%;


animation:

scan 1s infinite;


}




@keyframes scan{


0%{

opacity:1;

transform:

translate(-50%,-50%)

scale(.6);

}


100%{


opacity:0;


transform:

translate(-50%,-50%)

scale(1.5);


}


}








/* CARD */


#card{


position:fixed;


bottom:40px;


left:50%;


transform:

translateX(-50%);



width:85%;


max-width:430px;


background:

linear-gradient(

160deg,

#111,

#333

);



color:white;


padding:30px;



border-radius:30px;


display:none;


text-align:center;


z-index:100;



box-shadow:

0 0 50px black;


}





#icone{


font-size:90px;


}





#nome{


font-size:26px;


font-weight:bold;


}





#descricao{


opacity:.8;


}





#capturar{


margin-top:20px;



padding:

18px 45px;



border:0;


border-radius:50px;


font-size:22px;



font-weight:bold;



background:#00ff99;


}




</style>


</head>

<body>





<div id="intro">


<video

id="introVideo"

src="intro.mp4"

playsinline>


</video>



<button id="btnStart">

🚀 COMEÇAR

</button>


</div>






<div id="hud">


<div id="topo">

🚀 Jornada 0/5

</div>



<div id="scanner"></div>




<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>






<div id="card">


<div id="icone"></div>



<div id="nome"></div>


<p id="descricao"></p>




<button id="capturar">

PEGAR SKILL ⭐

</button>


</div>




</div>









<a-scene


id="scene"


mindar-image="
imageTargetSrc: ./targets.mind;

filterMinCF:0.01;

filterBeta:10;

warmupTolerance:5;

missTolerance:5;
"


renderer="
antialias:false;
precision:mediump;
colorManagement:true
"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>





<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>




<a-entity id="item0" mindar-image-target="targetIndex:0"></a-entity>

<a-entity id="item1" mindar-image-target="targetIndex:1"></a-entity>

<a-entity id="item2" mindar-image-target="targetIndex:2"></a-entity>

<a-entity id="item3" mindar-image-target="targetIndex:3"></a-entity>

<a-entity id="item4" mindar-image-target="targetIndex:4"></a-entity>




</a-scene>








<script>



const itens=[


{
nome:"Bússola da Estratégia",
icone:"🧭",
texto:"Você encontrou a visão do empreendedor."
},


{
nome:"Cristal Financeiro",
icone:"💎",
texto:"Você desbloqueou inteligência financeira."
},


{
nome:"Foguete das Vendas",
icone:"🚀",
texto:"Você conquistou crescimento."
},


{
nome:"Lâmpada da Inovação",
icone:"💡",
texto:"Você ativou novas ideias."
},


{
nome:"Coroa da Liderança",
icone:"👑",
texto:"Você conquistou liderança."
}


];





let encontrado=null;

let capturados=[];



const sistema=()=>{

return scene.systems[

"mindar-image-system"

];

};





btnStart.onclick=()=>{


btnStart.style.display="none";


introVideo.play();



introVideo.onended=()=>{


intro.style.display="none";


hud.style.display="block";


};


};










for(let i=0;i<5;i++){



document

.querySelector("#item"+i)


.addEventListener(


"targetFound",


()=>{



if(

capturados.includes(i)

)

return;




encontrado=i;



/* ECONOMIA DE PROCESSAMENTO */


sistema().pause();




scanner.style.display="block";


card.style.display="block";



icone.innerHTML=

itens[i].icone;



nome.innerHTML=

itens[i].nome;



descricao.innerHTML=

itens[i].texto;



if(navigator.vibrate)

navigator.vibrate(300);




});


}









capturar.onclick=()=>{


if(encontrado===null)

return;




capturados.push(encontrado);



atualizar();




scanner.style.display="none";


card.style.display="none";



encontrado=null;




/* VOLTA PROCURAR */


sistema().unpause();





if(

capturados.length===5

){



setTimeout(()=>{



card.style.display="block";


icone.innerHTML="🏆";


nome.innerHTML=

"Jornada Completa";



descricao.innerHTML=

"Você conquistou todas as habilidades empreendedoras 🚀";



capturar.style.display="none";



},800);



}



};








function atualizar(){



let html="";



itens.forEach(

(x,i)=>{



html +=

capturados.includes(i)

?

x.icone+"<br>"

:

"⬜<br>";



});



slots.innerHTML=html;



topo.innerHTML=

"🚀 Jornada "+capturados.length+"/5";



}





</script>


</body>

</html>
