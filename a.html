<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script type="module"
src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js">
</script>


<style>


html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;

}


#camera{

position:fixed;
inset:0;

width:100%;
height:100%;

object-fit:cover;

z-index:1;

}


/* inicio */


#inicio{

position:fixed;

inset:0;

background:

linear-gradient(
140deg,
#06142e,
#005f73,
#ffb703
);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

color:white;

padding:30px;

z-index:1000;

}


#start{

padding:20px 50px;

border:0;

border-radius:40px;

font-size:22px;

font-weight:bold;

background:#00ff99;

}



/* HUD */


#hud{

display:none;

}


#status{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#000b;

color:white;

padding:15px 25px;

border-radius:30px;

z-index:50;

text-align:center;

}



/* energia */


#energia{

position:fixed;

top:90px;

left:50%;

transform:translateX(-50%);

color:#00ff99;

font-size:24px;

font-weight:bold;

display:none;

z-index:50;

text-shadow:0 0 15px #00ff99;

}



/* radar */


#scanner{

position:fixed;

top:50%;

left:50%;

width:260px;

height:260px;

margin-left:-130px;

margin-top:-130px;

border-radius:50%;

border:3px solid #00ff99;

box-shadow:0 0 50px #00ff99;

display:none;

overflow:hidden;

z-index:20;

}


#scanner:after{

content:"";

position:absolute;

width:50%;

height:50%;

left:50%;

top:0;

background:

linear-gradient(
90deg,
#00ff99,
transparent
);

transform-origin:0% 100%;

animation:girar 2s linear infinite;

}


@keyframes girar{

to{

transform:rotate(360deg);

}

}





#inventario{

position:fixed;

right:15px;

top:90px;

background:#000a;

border:3px solid gold;

padding:15px;

border-radius:25px;

font-size:30px;

color:white;

z-index:50;

}




/* objeto */


#objeto{

position:fixed;

left:50%;

top:45%;

transform:translate(-50%,-50%);

width:300px;

height:300px;

display:none;

z-index:60;

filter:

drop-shadow(0 0 40px #00ff99);

}



.captura{

animation:capturar .8s;

}



@keyframes capturar{


to{

transform:

translate(-50%,-50%)

scale(0);

opacity:0;

}

}




#mensagem{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000c;

color:white;

padding:25px;

border-radius:25px;

font-size:22px;

text-align:center;

display:none;

z-index:80;

}




/* video */


#playerVideo{

position:fixed;

inset:0;

background:black;

display:none;

z-index:999;

}


#videoSkill{

width:100%;
height:100%;

object-fit:cover;

}




#debug{

position:fixed;

left:10px;

bottom:10px;

background:#000c;

color:#00ff99;

padding:10px;

font-size:12px;

z-index:9999;

}



</style>

</head>



<body>


<video id="camera" autoplay playsinline></video>




<div id="inicio">


<h1>🚀 Jornada Empreendedora</h1>


<p>
Encontre habilidades escondidas pelo ambiente
</p>


<button id="start">

COMEÇAR MISSÃO

</button>


</div>





<div id="hud">


<div id="status">

Preparando...

</div>


<div id="energia"></div>


<div id="scanner"></div>


<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>


</div>






<model-viewer

id="objeto"

auto-rotate

rotation-per-second="30deg"

interaction-prompt="none"

disable-zoom>

</model-viewer>




<div id="mensagem"></div>


<div id="debug"></div>





<div id="playerVideo">

<video id="videoSkill" playsinline controls></video>

</div>





<audio id="somFound" src="found.mp3"></audio>

<audio id="somCapture" src="capture.mp3"></audio>

<audio id="somComplete" src="complete.mp3"></audio>








<script>


const itens=[

{
nome:"Gestão Financeira",
icone:"💰",
modelo:"modelos/dotum.glb",
video:"video1.mp4"
},

{
nome:"Mercado",
icone:"🎯",
modelo:"modelos/sicoob.glb",
video:"video2.mp4"
},

{
nome:"Vendas",
icone:"🚀",
modelo:"modelos/sebrae.glb",
video:"video3.mp4"
},

{
nome:"Inovação",
icone:"💡",
modelo:"modelos/dotum.glb",
video:"video4.mp4"
},

{
nome:"Crescimento",
icone:"👑",
modelo:"modelos/sicoob.glb",
video:"video5.mp4"
}

];



let atual=0;

let capturados=[];



let passos=0;

let meta=0;

let ultimo=0;

let andando=false;



let direcao=0;

let alvo=null;

let ativo=false;

let movimento=0;







start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



await sensores();



let stream=

await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

});



camera.srcObject=stream;



buscar();


};







async function sensores(){


if(DeviceMotionEvent.requestPermission)

await DeviceMotionEvent.requestPermission();


if(DeviceOrientationEvent.requestPermission)

await DeviceOrientationEvent.requestPermission();




window.addEventListener(

"devicemotion",

e=>{


if(!andando)return;



let a=e.accelerationIncludingGravity;



if(!a)return;



let força=

Math.sqrt(

a.x*a.x+

a.y*a.y+

a.z*a.z

);



movimento=Math.abs(força-9.8);



if(

movimento>1.8 &&

Date.now()-ultimo>500

){


ultimo=Date.now();


passos++;



if(passos>=meta){


andando=false;


ativarItem();


}


}



});






window.addEventListener(

"deviceorientation",

e=>{


direcao=e.alpha||0;


rastrear();


});


}







function buscar(){


scanner.style.display="block";

energia.style.display="none";


passos=0;


meta=Math.floor(Math.random()*8)+8;


andando=true;



status.innerHTML=

"🚶 Caminhe procurando energia";


}







function ativarItem(){


scanner.style.display="none";


alvo=direcao;


ativo=true;



objeto.src=itens[atual].modelo;



somFound.play();



mensagem.style.display="block";


}







function rastrear(){


if(!ativo)return;



let dif=Math.abs(direcao-alvo);


if(dif>180)

dif=360-dif;



let pct=

Math.max(

0,

100-Math.round(dif*4)

);



energia.style.display="block";


energia.innerHTML=

"⚡ Energia "+pct+"%";



if(dif<15){


objeto.style.display="block";


mensagem.innerHTML=

"✨ Artefato encontrado<br>Toque para capturar";


}else{


objeto.style.display="none";


mensagem.innerHTML=

dif>0?

"🧭 Continue procurando..."

:

"";


}


}







objeto.onclick=()=>{


let item=itens[atual];



somCapture.play();



objeto.classList.add("captura");



setTimeout(()=>{


objeto.classList.remove("captura");


objeto.style.display="none";


ativo=false;


capturados.push(item);


atualizar();


abrirVideo(item.video);



},800);


};









function abrirVideo(v){


playerVideo.style.display="block";


videoSkill.src=v;


videoSkill.play();



videoSkill.onended=()=>{


playerVideo.style.display="none";


videoSkill.src="";



atual++;



if(atual>=5)

fim();

else

buscar();


};


}








function atualizar(){


let h="";


itens.forEach(i=>{


h+=capturados.includes(i)

?

i.icone+"<br>"

:

"⬜<br>";


});

slots.innerHTML=h;


}







function fim(){


somComplete.play();



mensagem.innerHTML=

"🏆 Parabéns!<br>Você completou a Jornada Empreendedora 🚀";



mensagem.style.display="block";


}








setInterval(()=>{


debug.innerHTML=

"DEBUG<br>"+

"👣 "+passos+"/"+meta+

"<br>🧭 "+Math.round(direcao)+"°"+

"<br>🎯 "+

(alvo?Math.round(alvo)+"°":"-")+

"<br>📳 "+movimento.toFixed(2);



},500);




</script>


</body>

</html>
