<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>

*{
box-sizing:border-box;
}


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:
Arial, sans-serif;

background:#000;

}



/* câmera cheia */


video,
canvas,
.a-canvas{

position:fixed!important;

top:0!important;
left:0!important;

width:100vw!important;
height:100vh!important;

object-fit:cover!important;

}




/* INTRO */


#intro{

position:fixed;

inset:0;

background:#000;

z-index:99999;

display:flex;

justify-content:center;

align-items:center;

}



#introVideo{

width:100%;

height:100%;

object-fit:cover;

}




#btnStart{

position:absolute;

bottom:60px;


border:0;


border-radius:50px;


padding:22px 45px;


font-size:22px;


font-weight:bold;


background:
linear-gradient(
45deg,
#ffd000,
#ff8c00
);


box-shadow:
0 0 40px #ff9900;


}







/* HUD */


#hud{

display:none;

}




#progresso{


position:fixed;

top:20px;
left:20px;


z-index:1000;


background:

rgba(0,0,0,.65);


backdrop-filter:blur(10px);



color:white;


padding:15px 25px;


border-radius:30px;


font-size:18px;


}







#inventario{


position:fixed;

top:20px;

right:20px;


z-index:1000;


background:

rgba(0,0,0,.65);


backdrop-filter:blur(10px);



color:white;


padding:15px;


border-radius:25px;



font-size:32px;



text-align:center;


}







/* SCANNER */


#scanner{

position:fixed;

inset:0;


display:none;


z-index:800;


pointer-events:none;

}



#scanner::after{


content:"";


position:absolute;


top:50%;

left:50%;


width:230px;

height:230px;


transform:

translate(-50%,-50%);



border:

5px solid #00ff99;


border-radius:50%;



animation:

radar 1.2s infinite;



}



@keyframes radar{


0%{

transform:

translate(-50%,-50%) scale(.6);

opacity:1;

}



100%{


transform:

translate(-50%,-50%) scale(1.5);


opacity:0;


}


}








/* CARD ITEM */


#card{


position:fixed;


bottom:40px;


left:50%;


transform:

translateX(-50%);



width:85%;


max-width:420px;



background:

rgba(0,0,0,.85);


color:white;


padding:25px;



border-radius:30px;



text-align:center;



z-index:2000;



display:none;


box-shadow:

0 20px 60px black;


}



#iconeItem{


font-size:80px;


}





#capturar{


margin-top:20px;


padding:

18px 45px;


border:0;


border-radius:40px;


background:#00ff99;


font-size:22px;


font-weight:bold;


}








</style>

</head>

<body>






<!-- INTRO -->


<div id="intro">


<video

id="introVideo"

src="intro.mp4"

playsinline

webkit-playsinline>

</video>



<button id="btnStart">

▶️ Começar Jornada

</button>


</div>






<div id="hud">


<div id="scanner"></div>



<div id="progresso">

🚀 Jornada 0/5

</div>




<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>




<div id="card">


<div id="iconeItem"></div>


<h2 id="nomeItem"></h2>



<button id="capturar">

CAPTURAR ⭐

</button>


</div>



</div>









<a-scene


id="scene"


embedded


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>



<a-camera

look-controls="enabled:false">

</a-camera>




<a-entity id="item0" mindar-image-target="targetIndex:0"></a-entity>

<a-entity id="item1" mindar-image-target="targetIndex:1"></a-entity>

<a-entity id="item2" mindar-image-target="targetIndex:2"></a-entity>

<a-entity id="item3" mindar-image-target="targetIndex:3"></a-entity>

<a-entity id="item4" mindar-image-target="targetIndex:4"></a-entity>




</a-scene>








<script>


const itens=[

["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💰"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]

];



let encontrado=null;

let capturados=[];




const scene=

document.querySelector("#scene");






btnStart.onclick=()=>{


btnStart.style.display="none";



introVideo.play();



introVideo.onended=async()=>{


intro.style.display="none";


hud.style.display="block";



await scene.systems[

"mindar-image-system"

].start();


};


};









for(let i=0;i<5;i++){


document

.querySelector("#item"+i)

.addEventListener(

"targetFound",

()=>{


if(

capturados.includes(i)

)

return;



encontrado=i;



scanner.style.display="block";


iconeItem.innerHTML=itens[i][1];


nomeItem.innerHTML=

"✨ Encontrado<br>"+

itens[i][0];



card.style.display="block";



if(navigator.vibrate)

navigator.vibrate(300);



});


}








capturar.onclick=()=>{



if(encontrado===null)

return;



capturados.push(

encontrado

);



scanner.style.display="none";


card.style.display="none";



atualizar();



encontrado=null;




if(

capturados.length===5

){


setTimeout(()=>{


card.style.display="block";


iconeItem.innerHTML="🏆";


nomeItem.innerHTML=

"Jornada completa!<br>Você desbloqueou seu potencial empreendedor 🚀";


capturar.style.display="none";


},1000);


}


};







function atualizar(){


let html="";



itens.forEach(

(item,i)=>{


html+=

capturados.includes(i)

?

item[1]+"<br>"

:

"⬜<br>";


});


slots.innerHTML=html;



progresso.innerHTML=

"🚀 Jornada "+capturados.length+"/5";


}




</script>


</body>

</html>
