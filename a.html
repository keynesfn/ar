<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora</title>


<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>


<style>


html,body{

margin:0;
height:100%;
width:100%;
overflow:hidden;
font-family:Arial;
background:black;

}



/* CAMERA */


#camera{

position:fixed;
inset:0;

width:100%;
height:100%;

object-fit:cover;

z-index:1;

}



/* INICIO */


#inicio{

position:fixed;

inset:0;

z-index:100;

background:

linear-gradient(
140deg,
#06142e,
#005f73,
#ffb703
);


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:30px;

}



#inicio h1{

font-size:36px;

}



#start{

padding:20px 50px;

border:0;

border-radius:50px;

font-size:22px;

font-weight:bold;

background:#00ff99;

}






/* HUD */


#hud{

display:none;

}



#status{

position:fixed;

top:25px;

left:50%;

transform:translateX(-50%);

background:#000a;

color:white;

padding:15px 30px;

border-radius:30px;

z-index:20;

text-align:center;

}




#inventario{

position:fixed;

right:15px;

top:90px;

background:#000a;

border:3px solid gold;

color:white;

font-size:32px;

padding:15px;

border-radius:25px;

z-index:20;

text-align:center;

}







/* RADAR */


#scanner{

position:fixed;

top:50%;
left:50%;

width:260px;
height:260px;

margin-left:-130px;
margin-top:-130px;

border-radius:50%;

border:3px solid #00ff99;

background:

radial-gradient(
circle,
rgba(0,255,150,.25),
transparent 70%
);

box-shadow:

0 0 40px #00ff99;


display:none;

overflow:hidden;

z-index:15;

}




#scanner:after{

content:"";

position:absolute;

width:50%;
height:50%;

left:50%;

top:0;


background:

linear-gradient(
90deg,
#00ff99,
transparent
);


transform-origin:

0% 100%;


animation:

radar 2s linear infinite;

}




@keyframes radar{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}







/* OBJETO */


#objeto{

position:fixed;

width:280px;

height:280px;

display:none;

z-index:30;

filter:

drop-shadow(0 0 30px #00ff99);

}







/* MENSAGEM */


#mensagem{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

background:#000c;

color:white;

width:85%;

padding:25px;

border-radius:30px;

font-size:22px;

text-align:center;

display:none;

z-index:40;

}







/* VIDEO */


#playerVideo{

position:fixed;

inset:0;

background:black;

display:none;

z-index:999;

}



#videoSkill{

width:100%;

height:100%;

object-fit:cover;

}


</style>


</head>



<body>





<video id="camera" autoplay playsinline></video>







<div id="inicio">


<h1>

🚀 Jornada Empreendedora

</h1>


<p>

Explore o ambiente e encontre novas habilidades

</p>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>







<div id="hud">


<div id="status">

Preparando...

</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>


</div>



<div id="scanner"></div>


</div>








<model-viewer

id="objeto"

auto-rotate>


</model-viewer>







<div id="mensagem"></div>








<div id="playerVideo">


<video

id="videoSkill"

playsinline

controls>


</video>


</div>









<script>


const itens=[


{
nome:"Gestão Financeira",
icone:"💰",
modelo:"modelos/dotum.glb",
video:"video1.mp4"
},


{
nome:"Clientes e Mercado",
icone:"🎯",
modelo:"modelos/sicoob.glb",
video:"video2.mp4"
},


{
nome:"Vendas",
icone:"🚀",
modelo:"modelos/sebrae.glb",
video:"video3.mp4"
},


{
nome:"Inovação",
icone:"💡",
modelo:"modelos/dotum.glb",
video:"video4.mp4"
},


{
nome:"Crescimento",
icone:"👑",
modelo:"modelos/sicoob.glb",
video:"video5.mp4"
}


];



let atual=0;

let capturados=[];


let passos=0;

let metaPassos=0;

let ultimoPasso=0;

let aguardandoPassos=false;








start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



await liberarSensores();



let stream=

await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"},

audio:false

});



camera.srcObject=stream;



buscar();


};










async function liberarSensores(){



if(

typeof DeviceMotionEvent!="undefined"

&&

typeof DeviceMotionEvent.requestPermission=="function"

){

await DeviceMotionEvent.requestPermission();

}





window.addEventListener(

"devicemotion",

(e)=>{



if(!aguardandoPassos)

return;



let acc=

e.accelerationIncludingGravity;



if(!acc)return;





let forca=

Math.sqrt(

acc.x*acc.x+

acc.y*acc.y+

acc.z*acc.z

);





let impacto=

Math.abs(forca-9.8);



let agora=Date.now();




if(

impacto>1.8 &&

agora-ultimoPasso>500

){



ultimoPasso=agora;



passos++;




status.innerHTML=

"🚶 Explorando...<br>"+

passos+

"/"+

metaPassos+

" passos";




if(passos>=metaPassos){



aguardandoPassos=false;



setTimeout(()=>{


mostrarObjeto();


},1000);



}



}



});


}









function buscar(){



scanner.style.display="block";



passos=0;



metaPassos=

Math.floor(

Math.random()*8

)+8;




aguardandoPassos=true;




status.innerHTML=

"🚶 Caminhe para encontrar habilidades";


}










function mostrarObjeto(){



scanner.style.display="none";



let item=itens[atual];



objeto.src=item.modelo;



objeto.style.display="block";



objeto.style.left=

Math.random()*50+20+"%";


objeto.style.top=

Math.random()*35+20+"%";



status.innerHTML=

"✨ Encontrado!";



mensagem.innerHTML=

"Toque para capturar";


mensagem.style.display="block";


navigator.vibrate?.(300);


}









objeto.onclick=()=>{


let item=itens[atual];



capturados.push(item);



objeto.style.display="none";


mensagem.style.display="none";



atualizar();



abrirVideo(item.video);



};










function abrirVideo(video){



playerVideo.style.display="block";


videoSkill.src=video;



videoSkill.play();





videoSkill.onended=()=>{



playerVideo.style.display="none";


videoSkill.src="";



atual++;



if(atual>=5)

fim();


else

buscar();



};



}









function atualizar(){


let html="";


itens.forEach(i=>{


html +=

capturados.includes(i)

?

i.icone+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;


}








function fim(){


scanner.style.display="none";


status.innerHTML=

"🏆 Jornada concluída";



mensagem.innerHTML=

"Parabéns! Você conquistou todas as habilidades 🚀";


mensagem.style.display="block";


}


</script>


</body>

</html>
