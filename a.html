<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>


html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:black;

font-family:Arial;

}



/* =====================
   INTRO
===================== */


#intro{

position:fixed;

top:0;
left:0;

width:100vw;
height:100vh;

background:black;

z-index:99999;

display:flex;

align-items:center;
justify-content:center;

}



#introVideo{

width:100%;

height:100%;

object-fit:cover;

}



#btnStart{

position:absolute;

bottom:60px;

padding:20px 45px;

font-size:22px;

font-weight:bold;

border-radius:40px;

border:0;

background:#ffcc00;

}







/* =====================
   FORÇA CAMERA
===================== */


video{

object-fit:cover;

}



.a-canvas{

position:fixed!important;

top:0!important;

left:0!important;

width:100vw!important;

height:100vh!important;

z-index:1!important;

}



/* =====================
   HUD
===================== */



#hud{

display:none;

}



#progresso{

position:fixed;

top:20px;

left:20px;

background:#000000aa;

color:white;

padding:15px 25px;

border-radius:30px;

font-size:18px;

z-index:20;

}




#inventario{


position:fixed;

right:20px;

top:20px;

background:#000000aa;

color:white;

padding:15px;

border-radius:20px;

font-size:32px;

text-align:center;

z-index:20;

}






#scanner{

position:fixed;

inset:0;

border:8px solid #00ff88;

display:none;

z-index:15;

pointer-events:none;

animation:pulse 1s infinite;

}


@keyframes pulse{

50%{

opacity:.3;

}

}





#card{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000000dd;

color:white;

padding:25px;

border-radius:25px;

text-align:center;

display:none;

z-index:30;

}



#icone{

font-size:80px;

}



#capturar{


padding:18px 40px;

border:0;

border-radius:40px;

background:#00ff99;

font-size:20px;

font-weight:bold;


}




</style>

</head>




<body>




<!-- AR PRIMEIRO -->


<a-scene


mindar-image="imageTargetSrc: ./targets.mind;"


color-space="sRGB"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"


>



<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>




<a-entity id="item0" mindar-image-target="targetIndex:0"></a-entity>

<a-entity id="item1" mindar-image-target="targetIndex:1"></a-entity>

<a-entity id="item2" mindar-image-target="targetIndex:2"></a-entity>

<a-entity id="item3" mindar-image-target="targetIndex:3"></a-entity>

<a-entity id="item4" mindar-image-target="targetIndex:4"></a-entity>



</a-scene>







<!-- INTRO POR CIMA -->


<div id="intro">


<video

id="introVideo"

src="intro.mp4"

playsinline

webkit-playsinline>


</video>




<button id="btnStart">

▶️ Começar Jornada

</button>



</div>






<div id="hud">


<div id="scanner"></div>



<div id="progresso">

🚀 Jornada 0/5

</div>




<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>


</div>




<div id="card">


<div id="icone"></div>


<h2 id="titulo"></h2>



<button id="capturar">

CAPTURAR ⭐

</button>


</div>



</div>







<script>


const itens=[

["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💰"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]

];



let encontrado=null;

let capturados=[];




/* INTRO */


btnStart.onclick=()=>{


btnStart.style.display="none";


introVideo.play();



introVideo.onended=()=>{


intro.style.display="none";


hud.style.display="block";


};


};






/* TARGETS */


for(let i=0;i<5;i++){


let alvo=

document.querySelector("#item"+i);



alvo.addEventListener(

"targetFound",

()=>{


if(capturados.includes(i))

return;



encontrado=i;


scanner.style.display="block";


card.style.display="block";


icone.innerHTML=itens[i][1];


titulo.innerHTML=

"✨ Encontrado<br>"+itens[i][0];



if(navigator.vibrate)

navigator.vibrate(300);



});


}








capturar.onclick=()=>{



if(encontrado===null)

return;



capturados.push(encontrado);



scanner.style.display="none";


card.style.display="none";


atualizar();



encontrado=null;




if(capturados.length===5){


setTimeout(()=>{


card.style.display="block";


icone.innerHTML="🏆";


titulo.innerHTML=

"Parabéns!<br>Você completou a Jornada Empreendedora 🚀";


capturar.style.display="none";


},1000);


}



};








function atualizar(){


let html="";



itens.forEach((x,i)=>{


html += capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";



});



slots.innerHTML=html;



progresso.innerHTML=

"🚀 Jornada "+capturados.length+"/5";


}



</script>


</body>

</html>
