<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;

}


/* MENU */


#inicio{

position:fixed;
inset:0;

z-index:1000;

background:
linear-gradient(135deg,#00172d,#004e92);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
text-align:center;

padding:30px;

}


#inicio h1{

font-size:35px;

}


#start{

padding:20px 45px;

border-radius:40px;

border:none;

font-size:22px;

background:#00ff99;

font-weight:bold;

}





/* HUD */


#hud{

display:none;

}



#contador{

position:fixed;

top:25px;
left:50%;

transform:translateX(-50%);

background:#0009;

color:white;

padding:15px 30px;

border-radius:30px;

z-index:999;

}



#bag{

position:fixed;

right:15px;
top:90px;

background:#0009;

border:3px solid gold;

color:white;

padding:15px;

border-radius:20px;

font-size:30px;

z-index:999;

}




#msg{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

background:#000c;

color:white;

width:85%;

padding:25px;

border-radius:25px;

text-align:center;

font-size:24px;

display:none;

z-index:999;

}


</style>

</head>


<body>



<div id="inicio">

<h1>🚀 Jornada Empreendedora</h1>

<p>
Encontre os 5 artefatos escondidos
</p>


<p>
🧭 💎 🚀 💡 👑
</p>


<button id="start">

COMEÇAR

</button>


</div>





<div id="hud">


<div id="contador">

0/5 habilidades

</div>


<div id="bag">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>


<div id="msg"></div>


</div>






<a-scene


id="scene"


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
"


renderer="
colorManagement:true
"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>



<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>






<!-- BUSSOLA -->


<a-entity id="item0" mindar-image-target="targetIndex:0">

<a-gltf-model

src="modelos/bussola.glb"

position="0 0 0"

scale="5 5 5"

>

</a-gltf-model>

</a-entity>





<a-entity id="item1" mindar-image-target="targetIndex:1">

<a-gltf-model

src="modelos/cristal.glb"

scale="5 5 5">

</a-gltf-model>

</a-entity>





<a-entity id="item2" mindar-image-target="targetIndex:2">

<a-gltf-model

src="modelos/foguete.glb"

scale="5 5 5">

</a-gltf-model>

</a-entity>





<a-entity id="item3" mindar-image-target="targetIndex:3">

<a-gltf-model

src="modelos/lampada.glb"

scale="5 5 5">

</a-gltf-model>

</a-entity>





<a-entity id="item4" mindar-image-target="targetIndex:4">

<a-gltf-model

src="modelos/coroa.glb"

scale="5 5 5">

</a-gltf-model>

</a-entity>




</a-scene>






<script>


const itens=[

["Bússola da Estratégia","🧭"],
["Cristal Financeiro","💎"],
["Foguete das Vendas","🚀"],
["Lâmpada da Inovação","💡"],
["Coroa da Liderança","👑"]

];


let atual=null;

let capturados=[];





start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";


await scene.systems["mindar-image-system"].start();


};







for(let i=0;i<5;i++){


document

.querySelector("#item"+i)

.addEventListener(

"targetFound",

()=>{


if(capturados.includes(i))

return;



atual=i;



msg.innerHTML=

"✨ Encontrou<br>"+

itens[i][1]+

"<br>"+
itens[i][0]+

"<br><br>Toque na tela para capturar";


msg.style.display="block";



}


);



}







document.body.onclick=()=>{


if(atual===null)

return;



if(capturados.includes(atual))

return;



capturados.push(atual);



msg.innerHTML=

"🎉 Capturado<br>"+

itens[atual][1];



atual=null;



atualizar();


};






function atualizar(){


let html="";


itens.forEach((x,i)=>{


html += capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;


contador.innerHTML=

capturados.length+"/5 habilidades";


}



</script>


</body>

</html>
