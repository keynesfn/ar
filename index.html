<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<link rel="stylesheet" href="css/style.css">


<script 
type="module"
src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js">
</script>


</head>


<body>


<video 
id="camera"
autoplay
playsinline>
</video>



<div id="inicio">

<h1>🚀 Jornada Empreendedora</h1>

<p>
Explore o ambiente e encontre habilidades escondidas
</p>


<button id="start">
COMEÇAR MISSÃO
</button>

</div>





<div id="hud">


<div id="status">
Preparando...
</div>


<div id="energia"></div>


<div id="scanner"></div>



<div id="inventario">


<div class="tituloInv">
⚡ SKILLS
</div>


<div id="slots">

<div class="slot vazio"></div>
<div class="slot vazio"></div>
<div class="slot vazio"></div>
<div class="slot vazio"></div>
<div class="slot vazio"></div>

</div>


<div id="nivel">
0/5
</div>


</div>


</div>





<model-viewer

id="objeto"

auto-rotate

rotation-per-second="30deg"

interaction-prompt="none"

disable-zoom>

</model-viewer>





<div id="mensagem"></div>




<div id="playerVideo">

<video

id="videoSkill"

playsinline

controls>

</video>

</div>




<div id="debug">
DEBUG
</div>




<audio 
id="somFound"
src="audio/found.mp3">
</audio>


<audio 
id="somCapture"
src="audio/capture.mp3">
</audio>


<audio
id="somComplete"
src="audio/complete.mp3">
</audio>



<script src="js/jornadas.js"></script>

<script src="js/app.js"></script>

</body>

</html>
