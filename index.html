<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caça AR</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}


#start{

    position:fixed;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    padding:25px 35px;

    border-radius:25px;

    border:0;

    font-size:24px;

    background:white;

    z-index:10;

}



#inventario{

    position:fixed;

    right:20px;

    top:20px;

    background:white;

    padding:15px;

    border-radius:15px;

    z-index:5;

    font-size:30px;

}



#mensagem{

    position:fixed;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

    width:80%;

    background:white;

    padding:20px;

    border-radius:20px;

    text-align:center;

    display:none;

    font-size:22px;

    z-index:20;

}


</style>

</head>


<body>


<button id="start">

📷 Entrar na Jornada

</button>



<div id="inventario">

🎒<br>

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>



<div id="mensagem"></div>





<script type="module">


import * as THREE from 

"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";




let cena;

let camera;

let renderizador;



let objetos=[];

let capturados=[];

let alvo=null;




const animais=[


{
nome:"Cachorrinho",
icone:"🐶"
},


{
nome:"Gatinho",
icone:"🐱"
},


{
nome:"Patinho",
icone:"🦆"
},


{
nome:"Leãozinho",
icone:"🦁"
},


{
nome:"Macaquinho",
icone:"🐵"
}


];





document
.getElementById("start")
.onclick = iniciarAR;





async function iniciarAR(){


if(!navigator.xr){

alert(
"Seu aparelho não suporta WebXR"
);

return;

}



document
.getElementById("start")
.style.display="none";



cena = new THREE.Scene();




camera = new THREE.PerspectiveCamera(

70,

window.innerWidth/window.innerHeight,

0.01,

50

);





renderizador = new THREE.WebGLRenderer(

{
alpha:true,

antialias:true
}

);



renderizador.setSize(

window.innerWidth,

window.innerHeight

);



renderizador.xr.enabled=true;




document.body.appendChild(

renderizador.domElement

);




const luz = 

new THREE.HemisphereLight(

0xffffff,

0xffffff,

3

);



cena.add(luz);





try{


const sessao =

await navigator.xr.requestSession(

"immersive-ar",

{

requiredFeatures:[

"local"

]

}

);



await renderizador.xr.setSession(

sessao

);



criarAnimais();




renderizador.setAnimationLoop(

loop

);




}

catch(e){


alert(

"Não consegui abrir a câmera AR"

);


console.error(e);


}



}







function criarAnimais(){



animais.forEach(

animal=>{



let canvas=

document.createElement("canvas");



canvas.width=256;

canvas.height=256;




let ctx=

canvas.getContext("2d");



ctx.font="160px Arial";


ctx.textAlign="center";


ctx.fillText(

animal.icone,

128,

170

);




let textura=

new THREE.CanvasTexture(

canvas

);



let material=

new THREE.SpriteMaterial(

{

map:textura

}

);




let sprite=

new THREE.Sprite(

material

);



sprite.scale.set(

0.8,

0.8,

0.8

);





let angulo=

Math.random()

*

Math.PI

*

2;




let distancia=

2 +

Math.random()*3;




sprite.position.set(


Math.cos(angulo)

*

distancia,


0,


Math.sin(angulo)

*

distancia


);




sprite.userData.nome=

animal.nome;



sprite.userData.icone=

animal.icone;




cena.add(sprite);



objetos.push(sprite);



});




}








function loop(){


alvo=null;



objetos.forEach(

obj=>{


obj.lookAt(

camera.position

);




let distancia=

camera.position.distanceTo(

obj.position

);



if(

distancia < 1.5

&&

!capturados.includes(

obj.userData.nome

)

){

alvo=obj;

}




});




renderizador.render(

cena,

camera

);


}







window.addEventListener(


"click",


()=>{


if(!alvo)

return;




capturados.push(

alvo.userData.nome

);



mostrar(

"🎉 Parabéns!<br><br>Você encontrou:<br><br>"

+

alvo.userData.icone

+

" "

+

alvo.userData.nome

+

"<br><br>Seja feliz por aí!"

);




cena.remove(

alvo

);




atualizarInventario();





if(

capturados.length===5

){


setTimeout(()=>{


mostrar(

"🏆 PARABÉNS!<br><br>Você conquistou todos os itens!<br><br>Você é um empreendedor foda pra caralho 🚀🔥"

);


},2000);


}




}


);








function atualizarInventario(){



let html="🎒<br>";



animais.forEach(

a=>{


html +=

capturados.includes(

a.nome

)

?

a.icone+"<br>"

:

"⬜<br>";



});



document

.getElementById("inventario")

.innerHTML=html;



}








function mostrar(texto){



let div=

document.getElementById(

"mensagem"

);



div.innerHTML=texto;



div.style.display="block";




setTimeout(()=>{


div.style.display="none";


},4000);



}



</script>


</body>

</html>
