<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
RPG AR - Caça aos Pets
</title>


<style>

body{
 margin:0;
 overflow:hidden;
 font-family:Arial;
}


#hud{

 position:fixed;
 top:20px;
 right:20px;

 background:white;

 padding:15px;

 border-radius:20px;

 z-index:10;

 font-size:25px;

}


#msg{

 position:fixed;

 bottom:40px;

 left:50%;

 transform:translateX(-50%);

 background:white;

 padding:20px;

 border-radius:20px;

 display:none;

 z-index:20;

 text-align:center;

 font-size:22px;

}


#start{

 position:fixed;

 top:50%;

 left:50%;

 transform:translate(-50%,-50%);

 padding:25px;

 font-size:24px;

 border-radius:30px;

 z-index:30;

}


</style>


</head>



<body>


<button id="start">
🚀 Começar Jornada AR
</button>



<div id="hud">

🎒<br>

<div id="inventario">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>




<div id="msg"></div>




<script type="module">


import * as THREE from

"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";



import {ARButton} from

"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";





let camera;

let scene;

let renderer;



let animais=[];


let capturados=[];


let alvo=null;




const pets=[


{
nome:"Cachorrinho",
emoji:"🐶"
},


{
nome:"Gatinho",
emoji:"🐱"
},


{
nome:"Patinho",
emoji:"🦆"
},


{
nome:"Leãozinho",
emoji:"🦁"
},


{
nome:"Macaco",
emoji:"🐵"
}


];





document
.getElementById("start")
.onclick=()=>{


document
.getElementById("start")
.remove();


iniciar();


};






function iniciar(){



scene =
new THREE.Scene();



camera =
new THREE.PerspectiveCamera(

70,

window.innerWidth/window.innerHeight,

0.01,

50

);



renderer =
new THREE.WebGLRenderer(
{
alpha:true,
antialias:true
}
);



renderer.setSize(

window.innerWidth,

window.innerHeight

);



renderer.xr.enabled=true;



document.body.appendChild(

renderer.domElement

);



document.body.appendChild(

ARButton.createButton(

renderer,

{
requiredFeatures:[]
}

)

);




let luz=

new THREE.HemisphereLight(

0xffffff,

0xffffff,

3

);


scene.add(luz);





renderer.xr.addEventListener(


"sessionstart",

()=>{


criarAnimais();


}


);



renderer.setAnimationLoop(

jogo

);



}









function criarAnimais(){



pets.forEach(

(pet)=>{



const canvas =

document.createElement("canvas");


canvas.width=256;

canvas.height=256;


const ctx=

canvas.getContext("2d");



ctx.font="150px Arial";


ctx.textAlign="center";


ctx.fillText(

pet.emoji,

128,

170

);




const textura=

new THREE.CanvasTexture(canvas);




const material=

new THREE.SpriteMaterial(

{
map:textura
}

);



const sprite=

new THREE.Sprite(

material

);




sprite.scale.set(

0.8,

0.8,

0.8

);





let angulo=

Math.random()

*

Math.PI

*

2;




let distancia=

2+

Math.random()*4;




sprite.position.set(


Math.cos(angulo)

*

distancia,


0,


Math.sin(angulo)

*

distancia



);




sprite.userData.nome=

pet.nome;




scene.add(sprite);



animais.push(sprite);



}


);



}









function jogo(){



alvo=null;



animais.forEach(

animal=>{


animal.lookAt(

camera.position

);



let distancia=

camera.position.distanceTo(

animal.position

);



if(

distancia < 1.5

&&

!capturados.includes(

animal.userData.nome

)

){


alvo=animal;


}



}


);




renderer.render(

scene,

camera

);


}








window.addEventListener(


"click",


()=>{



if(!alvo)

return;




let nome=

alvo.userData.nome;




capturados.push(nome);



scene.remove(alvo);




mostrarMensagem(

"🎉 Parabéns!<br><br>Você encontrou seu "

+

nome+

"<br><br>Seja feliz por aí 🚀"

);



atualizarInventario();




if(

capturados.length===5

){


setTimeout(()=>{


mostrarMensagem(

"🏆 PARABÉNS!<br><br>Você conquistou todos os desafios.<br><br>Você é um empreendedor foda pra caralho 🚀🔥"

);


},1500);



}



}



);








function atualizarInventario(){



let html="";



pets.forEach(

pet=>{



html +=


capturados.includes(pet.nome)


?


pet.emoji+"<br>"


:


"⬜<br>";



}


);



document

.getElementById("inventario")

.innerHTML=html;



}







function mostrarMensagem(texto){



let div=

document.getElementById("msg");



div.innerHTML=texto;



div.style.display="block";



setTimeout(()=>{


div.style.display="none";


},4000);



}





</script>




</body>


</html>
