<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta 
name="viewport" 
content="width=device-width, initial-scale=1">


<title>
Jornada Empreendedora AR
</title>


<link 
rel="stylesheet" 
href="css/style.css">


<script 
type="module"
src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js">
</script>


</head>



<body>


<!-- CAMERA -->

<video
id="camera"
autoplay
playsinline>
</video>





<!-- TELA INICIAL -->


<div id="inicio">


<h1>
🚀 Jornada Empreendedora
</h1>


<p>
Explore, descubra e desbloqueie habilidades empreendedoras
</p>


<button id="start">

COMEÇAR MISSÃO

</button>


</div>






<!-- VIDEO INTRO -->


<div id="introVideo">


<video

id="videoIntro"

src="videos/intro.mp4"

playsinline>

</video>


</div>







<!-- HUD -->


<div id="hud">


<div id="status">

Preparando...

</div>



<div id="energia"></div>



<div id="scanner"></div>





<!-- INVENTÁRIO -->


<div id="inventario">


<div class="tituloInv">

⚡ SKILLS

</div>



<div id="slots">


<div class="slot vazio"></div>

<div class="slot vazio"></div>

<div class="slot vazio"></div>

<div class="slot vazio"></div>

<div class="slot vazio"></div>


</div>



<div id="nivel">

0/5

</div>



</div>


</div>








<!-- OBJETO 3D -->


<model-viewer

id="objeto"

auto-rotate

rotation-per-second="30deg"

interaction-prompt="none"

disable-zoom>


</model-viewer>








<!-- MENSAGEM -->


<div id="mensagem"></div>








<!-- VIDEO DAS SKILLS -->


<div id="playerVideo">


<video

id="videoSkill"

playsinline

controls>


</video>


</div>









<!-- FORM PERFIL -->


<div id="formPerfil">


<h2>

🚀 Personalize sua Jornada

</h2>


<p>

Qual caminho deseja seguir?

</p>



<input

id="nomeJogador"

placeholder="Seu nome">





<select id="perfilJogador">


<option value="">

Escolha seu perfil

</option>


<option value="empreendedor">

🚀 Empreendedor

</option>



<option value="profissional">

👔 Profissional

</option>



<option value="estudante">

🎓 Estudante

</option>



</select>





<button id="salvarPerfil">

CONTINUAR

</button>



</div>








<!-- FORM WHATSAPP -->


<div id="formWhats">


<h2>

🏆 Jornada completa!

</h2>



<p>

Receba mais conteúdos do evento

</p>



<input

id="whatsapp"

placeholder="WhatsApp">


<button id="enviarLead">

RECEBER 🚀

</button>



</div>









<!-- DEBUG -->


<div id="debug">

DEBUG

</div>








<!-- AUDIO -->


<audio 
id="somFound" 
src="audio/found.mp3">
</audio>



<audio 
id="somCapture" 
src="audio/capture.mp3">
</audio>



<audio 
id="somComplete" 
src="audio/complete.mp3">
</audio>








<script src="js/jornadas.js"></script>


<script src="js/app.js"></script>



</body>

</html>
