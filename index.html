<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>


<style>

html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
background:#000;

}


/* CAMERA */

#camera{

position:fixed;

inset:0;

width:100%;
height:100%;

object-fit:cover;

z-index:1;

}


/* INICIO */

#inicio{

position:fixed;
inset:0;

z-index:100;

background:linear-gradient(150deg,#06203f,#0b7285,#ffb703);

color:white;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

padding:30px;

}


#start{

padding:20px 50px;

border:0;

border-radius:50px;

font-size:22px;

background:#00ff99;

font-weight:bold;

}



/* HUD */

#hud{

display:none;

}


#contador{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#000a;

color:white;

padding:15px 25px;

border-radius:30px;

z-index:20;

}



#inventario{

position:fixed;

right:15px;

top:90px;

background:#000a;

color:white;

font-size:32px;

border:3px solid gold;

border-radius:20px;

padding:15px;

z-index:20;

}



/* OBJETO */

#objeto{

position:fixed;

width:220px;

height:220px;

display:none;

z-index:30;

animation:pular 1s infinite alternate;

}


@keyframes pular{

from{

transform:translateY(0);

}

to{

transform:translateY(-25px);

}

}





#mensagem{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

background:#000c;

color:white;

padding:25px;

border-radius:30px;

font-size:22px;

display:none;

z-index:40;

text-align:center;

}


</style>


</head>


<body>




<video

id="camera"

autoplay

playsinline>

</video>





<div id="inicio">


<h1>🚀 Jornada Empreendedora</h1>


<p>
Ande pelo ambiente e capture as habilidades
</p>


<h2>🧭 💎 🚀 💡 👑</h2>


<button id="start">

COMEÇAR MISSÃO

</button>


</div>







<div id="hud">


<div id="contador">

0/5 habilidades

</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>


</div>





<model-viewer

id="objeto"

camera-controls

auto-rotate

shadow-intensity="1"

>

</model-viewer>





<div id="mensagem"></div>








<script>


const itens=[


{
nome:"Bússola da Estratégia",
icone:"🧭",
arquivo:"modelos/bussola.glb",
tempo:15000
},


{
nome:"Cristal Financeiro",
icone:"💎",
arquivo:"modelos/cristal.glb",
tempo:45000
},


{
nome:"Foguete das Vendas",
icone:"🚀",
arquivo:"modelos/foguete.glb",
tempo:75000
},


{
nome:"Lâmpada da Inovação",
icone:"💡",
arquivo:"modelos/lampada.glb",
tempo:105000
},


{
nome:"Coroa da Liderança",
icone:"👑",
arquivo:"modelos/coroa.glb",
tempo:135000
}


];



let atual=-1;

let capturados=[];







start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



let stream=

await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment"

}

});



camera.srcObject=stream;



programar();


};







function programar(){



atual++;



if(atual>=itens.length)

return;




let atraso=


Math.floor(

Math.random()*15000

)

+

itens[atual].tempo;





setTimeout(()=>{


mostrarItem();



},atraso);



}







function mostrarItem(){



let item=itens[atual];



objeto.src=item.arquivo;



objeto.style.display="block";




// posição aleatória


objeto.style.left=

Math.random()*55+15+"%";



objeto.style.top=

Math.random()*45+20+"%";




mensagem.innerHTML=

"✨ Uma habilidade apareceu!";



mensagem.style.display="block";



if(navigator.vibrate)

navigator.vibrate(300);



}








objeto.onclick=()=>{


let item=itens[atual];



capturados.push(item);



mensagem.innerHTML=

"🎉 Capturado<br>"+

item.icone+

"<br>"+

item.nome;




objeto.style.display="none";



atualizar();




setTimeout(()=>{


mensagem.style.display="none";


programar();



},2000);



};









function atualizar(){



let html="";



itens.forEach(i=>{


html +=

capturados.includes(i)

?

i.icone+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;



contador.innerHTML=

capturados.length+

"/5 habilidades";



if(capturados.length===5){


mensagem.innerHTML=

"🏆 Jornada concluída<br>Você conquistou todas as habilidades 🚀";


mensagem.style.display="block";


}


}


</script>


</body>


</html>
