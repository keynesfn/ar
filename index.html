<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:#000;

}


video,
canvas,
.a-canvas{

position:fixed!important;

top:0!important;
left:0!important;

width:100vw!important;
height:100vh!important;

object-fit:cover!important;

}


/* INTRO */


#intro{

position:fixed;

inset:0;

background:black;

z-index:99999;

display:flex;

justify-content:center;

align-items:center;

}



#introVideo{

width:100%;

height:100%;

object-fit:cover;

}



#playIntro{


position:absolute;

bottom:70px;


font-size:25px;


padding:20px 45px;


border-radius:50px;


border:none;


background:#ffcc00;


font-weight:bold;


}




/* HUD */


#progresso{

position:fixed;

top:20px;

left:20px;


background:rgba(0,0,0,.7);

color:white;

padding:15px 25px;

border-radius:30px;

font-size:18px;

z-index:9999;

}




#inventario{

position:fixed;

top:20px;

right:20px;

background:rgba(0,0,0,.7);

color:white;

padding:15px;

border-radius:20px;

font-size:30px;

text-align:center;

z-index:9999;

}




#scanner{

position:fixed;

inset:0;


border:10px solid #00ff88;


display:none;


box-sizing:border-box;


animation:pulse 1s infinite;


z-index:9000;


pointer-events:none;

}



@keyframes pulse{


0%{opacity:.2}

50%{opacity:1}

100%{opacity:.2}


}






#alerta{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);


width:85%;


background:rgba(0,0,0,.85);


color:white;


padding:25px;


border-radius:30px;


font-size:22px;


text-align:center;


display:none;


z-index:10000;


}


</style>

</head>


<body>



<!-- INTRO -->


<div id="intro">


<video

id="introVideo"

src="./intro.mp4"

playsinline

webkit-playsinline>

</video>



<button id="playIntro">

▶️ Começar

</button>


</div>





<div id="scanner"></div>



<div id="progresso">

🚀 Jornada 0/5

</div>



<div id="inventario">

🎒<br>

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>




<div id="alerta"></div>







<a-scene


mindar-image="imageTargetSrc: ./targets.mind;"


embedded


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"


>



<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>






<a-entity id="item0" mindar-image-target="targetIndex:0">

<a-text value="🧭" scale="3 3 3"></a-text>

</a-entity>



<a-entity id="item1" mindar-image-target="targetIndex:1">

<a-text value="💰" scale="3 3 3"></a-text>

</a-entity>



<a-entity id="item2" mindar-image-target="targetIndex:2">

<a-text value="🚀" scale="3 3 3"></a-text>

</a-entity>



<a-entity id="item3" mindar-image-target="targetIndex:3">

<a-text value="💡" scale="3 3 3"></a-text>

</a-entity>



<a-entity id="item4" mindar-image-target="targetIndex:4">

<a-text value="👑" scale="3 3 3"></a-text>

</a-entity>



</a-scene>







<script>



const itens=[

{
nome:"Bússola da Estratégia",
icone:"🧭"
},

{
nome:"Cristal Financeiro",
icone:"💰"
},

{
nome:"Foguete das Vendas",
icone:"🚀"
},

{
nome:"Lâmpada da Inovação",
icone:"💡"
},

{
nome:"Coroa da Liderança",
icone:"👑"
}

];





let encontrado=null;

let capturados=[];






/* VIDEO COM SOM */


document

.querySelector("#playIntro")

.onclick=()=>{


let video=

document.querySelector("#introVideo");


document

.querySelector("#playIntro")

.style.display="none";



video.play();



video.onended=()=>{


document

.querySelector("#intro")

.style.display="none";


};


};









/* RECONHECIMENTO */


for(let i=0;i<5;i++){



let item=

document.querySelector("#item"+i);




item.addEventListener(

"targetFound",

()=>{



encontrado=i;



document

.querySelector("#scanner")

.style.display="block";




mostrar(

"✨ ITEM ENCONTRADO ✨<br><br>"+

"<span style='font-size:70px'>"+

itens[i].icone+

"</span><br>"+

itens[i].nome+

"<br><br>Toque para capturar"

);



if(navigator.vibrate){

navigator.vibrate(300);

}



});






item.addEventListener(

"targetLost",

()=>{


document

.querySelector("#scanner")

.style.display="none";


});


}









/* CAPTURA */


window.addEventListener(

"click",

()=>{



if(encontrado===null)

return;




if(

capturados.includes(encontrado)

)

return;




capturados.push(

encontrado

);



mostrar(

"🎉 Capturado<br><br>"+

itens[encontrado].icone+

"<br>"+

itens[encontrado].nome


);



atualizar();



encontrado=null;





if(

capturados.length===5

){


setTimeout(()=>{


mostrar(

"🏆 Jornada Completa<br><br>Você desbloqueou seu potencial empreendedor 🚀"

);


},1500);



}




});


function atualizar(){


let html="";


itens.forEach(

(item,i)=>{


html+=

capturados.includes(i)

?

item.icone+"<br>"

:

"⬜<br>";


});


document

.querySelector("#slots")

.innerHTML=html;



document

.querySelector("#progresso")

.innerHTML=

"🚀 Jornada "+capturados.length+"/5";


}







function mostrar(txt){


let alerta=

document.querySelector("#alerta");



alerta.innerHTML=txt;



alerta.style.display="block";


}



</script>



</body>

</html>
