<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jornada Empreendedora</title>
<link rel="stylesheet" href="css/style.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>
<script defer src="js/jornadas.js"></script>
<script defer src="js/app.js"></script>
</head>
<body>
<video id="camera" autoplay playsinline></video>
<section id="inicio">
<h1>🚀 Jornada Empreendedora</h1>
<p>Explore, encontre habilidades e complete sua missão.</p>
<button id="btnStart">COMEÇAR</button>
</section>
<section id="jogo">
<div id="status">Preparando...</div>
<div id="radar"></div>
<div id="sinal"></div>
<div id="inventario">
<h3>SKILLS</h3>
<div id="slots"></div>
</div>
</section>
<model-viewer id="objeto" auto-rotate rotation-per-second="30deg"></model-viewer>
<div id="msg"></div>
<section id="videoBox">
<video id="videoSkill" playsinline controls></video>
</section>
<section id="perfil">
<h2>Escolha sua Jornada</h2>
<input id="nome" placeholder="Seu nome">
<select id="tipo">
<option value="">Selecione</option>
<option value="empreendedor">🚀 Empreendedor</option>
<option value="profissional">👔 Profissional</option>
<option value="estudante">🎓 Estudante</option>
</select>
<button id="btnPerfil">Continuar</button>
</section>
<section id="lead">
<h2>🏆 Parabéns!</h2>
<p>Receba novas dicas do evento:</p>
<input id="fone" placeholder="WhatsApp">
<button id="btnLead">Enviar</button>
</section>
<div id="debug"></div>
<audio id="sndFound" src="audio/found.mp3"></audio>
<audio id="sndCapture" src="audio/capture.mp3"></audio>
</body>
</html>
