<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
Jornada Empreendedora AR
</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>



<style>


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:#000;

}


video,
canvas,
.a-canvas{

position:fixed!important;

top:0!important;
left:0!important;

width:100vw!important;
height:100vh!important;

object-fit:cover!important;

}



/* INTRO */


#intro{

position:fixed;

inset:0;

background:black;

z-index:50000;

display:flex;

align-items:center;

justify-content:center;

}



#videoIntro{


width:100%;

height:100%;

object-fit:cover;


}



#btnComecar{


position:absolute;

bottom:60px;


padding:20px 45px;


border-radius:50px;


border:none;


font-size:22px;


font-weight:bold;


background:#ffcc00;


z-index:2;


}




/* HUD */


#progresso{


position:fixed;

top:20px;

left:20px;


background:

rgba(0,0,0,.6);


color:white;


padding:15px 25px;


border-radius:30px;


font-size:18px;


z-index:9999;


}





#inventario{


position:fixed;


right:20px;


top:20px;


background:

rgba(0,0,0,.6);



color:white;


padding:15px;


border-radius:25px;


font-size:28px;


text-align:center;


z-index:9999;


}



#tituloInv{


font-size:12px;

}





#scanner{


position:fixed;

inset:0;


border:8px solid #00ff88;


display:none;


box-sizing:border-box;


animation:pulse 1s infinite;


z-index:9000;


pointer-events:none;


}




@keyframes pulse{

0%{opacity:.2;}

50%{opacity:1;}

100%{opacity:.2;}

}




#alerta{


position:fixed;


bottom:40px;


left:50%;


transform:translateX(-50%);


width:85%;


background:

rgba(0,0,0,.8);


color:white;


padding:25px;


border-radius:30px;


font-size:22px;


text-align:center;


display:none;


z-index:10000;


}





/* VIDEOS */


#videoBox{


position:fixed;


inset:0;


background:black;


display:none;


z-index:30000;


}



#videoSkill{


width:100%;

height:100%;


object-fit:contain;


}




</style>

</head>




<body>




<!-- INTRO -->


<div id="intro">


<video

id="videoIntro"

src="videos/intro.mp4"

autoplay

muted

playsinline

webkit-playsinline>

</video>




<button id="btnComecar">

🚀 Iniciar Jornada

</button>


</div>








<div id="scanner"></div>




<div id="progresso">

🚀 Jornada 0/5

</div>




<div id="inventario">

<div id="tituloInv">

SKILLS

</div>


🎒


<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜


</div>


</div>





<div id="alerta"></div>





<div id="videoBox">


<video

id="videoSkill"

controls

playsinline

webkit-playsinline>


</video>


</div>









<a-scene


id="ar"


embedded="false"


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"

>




<a-camera

position="0 0 0"

look-controls="enabled:false">


</a-camera>





<a-entity id="item0" mindar-image-target="targetIndex:0">

<a-text value="🧭" scale="3 3 3" align="center"></a-text>

</a-entity>




<a-entity id="item1" mindar-image-target="targetIndex:1">

<a-text value="💰" scale="3 3 3" align="center"></a-text>

</a-entity>




<a-entity id="item2" mindar-image-target="targetIndex:2">

<a-text value="🚀" scale="3 3 3" align="center"></a-text>

</a-entity>




<a-entity id="item3" mindar-image-target="targetIndex:3">

<a-text value="💡" scale="3 3 3" align="center"></a-text>

</a-entity>




<a-entity id="item4" mindar-image-target="targetIndex:4">

<a-text value="👑" scale="3 3 3" align="center"></a-text>

</a-entity>




</a-scene>










<script>



const itens=[


{
nome:"Visão Estratégica",
icone:"🧭",
video:"videos/01-estrategia.mp4"
},


{
nome:"Gestão Financeira",
icone:"💰",
video:"videos/02-financas.mp4"
},


{
nome:"Vendas",
icone:"🚀",
video:"videos/03-vendas.mp4"
},


{
nome:"Inovação",
icone:"💡",
video:"videos/04-inovacao.mp4"
},


{
nome:"Liderança",
icone:"👑",
video:"videos/05-lideranca.mp4"
}


];



let encontrado=null;

let capturados=[];




const sceneEl = 

document.querySelector("#ar");






document

.querySelector("#btnComecar")

.onclick = async()=>{



document

.querySelector("#intro")

.style.display="none";




await sceneEl.systems[

"mindar-image-system"

].start();



};








for(let i=0;i<5;i++){



let alvo=

document.querySelector("#item"+i);





alvo.addEventListener(


"targetFound",


()=>{


encontrado=i;




document

.querySelector("#scanner")

.style.display="block";




mostrar(

"✨ ITEM ENCONTRADO ✨<br><br>"+

itens[i].icone+

"<br>"+

itens[i].nome+

"<br><br>👇 Toque para capturar"


);



if(navigator.vibrate)

navigator.vibrate(300);



}

);






alvo.addEventListener(


"targetLost",


()=>{


document

.querySelector("#scanner")

.style.display="none";



}


);



}









window.addEventListener(


"click",


()=>{



if(encontrado===null)

return;




if(

capturados.includes(encontrado)

)

return;




capturados.push(encontrado);



abrirVideo(

itens[encontrado].video

);



atualizar();



encontrado=null;



}



);








function abrirVideo(src){



let box=

document.querySelector("#videoBox");



let video=

document.querySelector("#videoSkill");




video.src=src;


box.style.display="block";



video.play();





video.onended=()=>{


box.style.display="none";


video.src="";




if(

capturados.length===5

){


setTimeout(()=>{


abrirFinal();


},1000);


}



};



}









function abrirFinal(){



let video=

document.querySelector("#videoSkill");



let box=

document.querySelector("#videoBox");




video.src=

"videos/final.mp4";



box.style.display="block";



video.play();



}









function atualizar(){



let html="";



itens.forEach(

(item,i)=>{



html +=

capturados.includes(i)

?

item.icone+"<br>"

:

"⬜<br>";



});



document

.querySelector("#slots")

.innerHTML=html;





document

.querySelector("#progresso")

.innerHTML=


"🚀 Jornada "

+

capturados.length

+

"/5";



}









function mostrar(texto){



let a=

document.querySelector("#alerta");



a.innerHTML=texto;


a.style.display="block";



}




</script>




</body>

</html>
