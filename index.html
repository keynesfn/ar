<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
Caça AR - Empreendedor
</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js">
</script>


<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">
</script>


<style>


body{

margin:0;

font-family:Arial;

}



#inventario{


position:fixed;

top:20px;

right:20px;

background:white;

padding:15px;

border-radius:15px;

font-size:25px;

z-index:999;

}



#mensagem{


position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);


width:80%;

padding:20px;


background:white;


border-radius:20px;


font-size:22px;


text-align:center;


display:none;


z-index:1000;

}



</style>


</head>


<body>



<div id="inventario">

🎒<br>

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜


</div>




<div id="mensagem"></div>





<a-scene


mindar-image="imageTargetSrc: ./targets.mind;"


color-space="sRGB"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"



>



<a-assets>


</a-assets>




<a-camera

position="0 0 0"

look-controls="enabled:false"

>

</a-camera>







<!-- ITEM 1 -->


<a-entity

mindar-image-target="targetIndex:0"

id="item0"

>


<a-text

value="🐶"

align="center"

position="0 0 0"

scale="3 3 3"

>


</a-text>


</a-entity>







<!-- ITEM 2 -->


<a-entity

mindar-image-target="targetIndex:1"

id="item1"

>


<a-text

value="🐱"

align="center"

position="0 0 0"

scale="3 3 3"

>


</a-text>


</a-entity>








<!-- ITEM 3 -->


<a-entity

mindar-image-target="targetIndex:2"

id="item2"


>


<a-text

value="🦆"

align="center"

position="0 0 0"

scale="3 3 3"


>


</a-text>


</a-entity>








<!-- ITEM 4 -->


<a-entity

mindar-image-target="targetIndex:3"

id="item3"

>


<a-text

value="🦁"

align="center"

position="0 0 0"

scale="3 3 3"


>


</a-text>


</a-entity>







<!-- ITEM 5 -->


<a-entity

mindar-image-target="targetIndex:4"

id="item4"


>


<a-text

value="🐵"

align="center"

position="0 0 0"

scale="3 3 3"

>


</a-text>


</a-entity>






</a-scene>






<script>


const animais=[


{
nome:"Cachorrinho",
emoji:"🐶"
},


{
nome:"Gatinho",
emoji:"🐱"
},


{
nome:"Patinho",
emoji:"🦆"
},


{
nome:"Leão",
emoji:"🦁"
},


{
nome:"Macaco",
emoji:"🐵"
}


];



let encontrado=null;


let capturados=[];






for(

let i=0;

i<5;

i++

){


let item=

document

.querySelector(

"#item"+i

);



item.addEventListener(


"targetFound",


()=>{


encontrado=i;



}


);



}







window.addEventListener(


"click",


()=>{



if(encontrado===null)

return;



if(

capturados.includes(

encontrado

)

)

return;





capturados.push(

encontrado

);





mostrar(

"🎉 Parabéns!<br><br>Você encontrou:<br>"


+

animais[encontrado].emoji

+

" "

+

animais[encontrado].nome

+

"<br><br>Seja feliz por aí 🚀"


);




atualizarInventario();




if(

capturados.length===5

){



setTimeout(
()=>{
mostrar(
"🏆 PARABÉNS!<br><br>Você conquistou todos os itens!<br><br>Você é um empreendedor TOP 🚀🔥"
);



},2000);
}
}
);

function atualizarInventario(){



let html="🎒<br>";



animais.forEach(

(a,index)=>{



html +=

capturados.includes(index)


?

a.emoji+"<br>"


:

"⬜<br>";



});



document

.querySelector("#inventario")

.innerHTML=html;



}








function mostrar(txt){



let msg=

document.querySelector(

"#mensagem"

);



msg.innerHTML=txt;



msg.style.display="block";




setTimeout(

()=>{


msg.style.display="none";


},

4000

);



}



</script>



</body>


</html>
