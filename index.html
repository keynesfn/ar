<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>


<style>


html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;

font-family:Arial;

background:black;

}



/* CAMERA */


#camera{

position:fixed;

inset:0;

width:100%;
height:100%;

object-fit:cover;

z-index:1;

}



/* INICIO */


#inicio{

position:fixed;

inset:0;

z-index:100;

background:

linear-gradient(140deg,#06142e,#005f73,#ffb703);


display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

color:white;

padding:30px;

}



#inicio h1{

font-size:36px;

}



#start{

padding:20px 50px;

border:0;

border-radius:50px;

font-size:22px;

font-weight:bold;

background:#00ff99;

}





/* HUD */


#hud{

display:none;

}



#contador{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:#000a;

color:white;

padding:15px 30px;

border-radius:40px;

z-index:20;

}





#inventario{

position:fixed;

top:90px;

right:15px;

background:#000a;

border:3px solid gold;

color:white;

font-size:32px;

padding:15px;

border-radius:25px;

z-index:20;

text-align:center;

}






/* SCANNER */


#scanner{

position:fixed;

top:50%;

left:50%;

width:220px;

height:220px;

margin-left:-110px;

margin-top:-110px;


border:5px solid #00ff99;

border-radius:50%;


display:none;


z-index:15;


animation:pulse 1s infinite;

}


@keyframes pulse{


0%{

transform:scale(.5);

opacity:1;

}


100%{

transform:scale(1.5);

opacity:0;

}


}







/* OBJETO */


#objeto{


position:fixed;


width:260px;

height:260px;


display:none;


z-index:30;


filter:

drop-shadow(0 0 25px #00ff99);



}





/* MENSAGEM */


#mensagem{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);


background:#000c;


color:white;


width:85%;


padding:25px;


border-radius:30px;


font-size:22px;


text-align:center;


display:none;


z-index:40;

}





/* VIDEO */


#playerVideo{

position:fixed;

inset:0;

background:black;

display:none;

z-index:999;

}



#videoSkill{

width:100%;

height:100%;

object-fit:cover;

}


</style>

</head>


<body>



<video

id="camera"

autoplay

playsinline>

</video>





<div id="inicio">


<h1>

🚀 Jornada Empreendedora

</h1>


<p>

Caminhe pelo ambiente e encontre as habilidades escondidas

</p>



<h2>

🧭 💎 🚀 💡 👑

</h2>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>






<div id="hud">


<div id="contador">

Preparando...

</div>



<div id="inventario">

🎒


<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>


</div>


<div id="scanner"></div>


</div>






<model-viewer

id="objeto"

auto-rotate

camera-controls>


</model-viewer>






<div id="mensagem"></div>







<div id="playerVideo">


<video

id="videoSkill"

playsinline

controls>

</video>


</div>








<script>


const itens=[

{
nome:"Bússola da Estratégia",
icone:"🧭",
modelo:"modelos/bussola.glb",
video:"video1.mp4"
},

{
nome:"Cristal Financeiro",
icone:"💎",
modelo:"modelos/cristal.glb",
video:"video2.mp4"
},

{
nome:"Foguete das Vendas",
icone:"🚀",
modelo:"modelos/foguete.glb",
video:"video3.mp4"
},

{
nome:"Lâmpada da Inovação",
icone:"💡",
modelo:"modelos/lampada.glb",
video:"video4.mp4"
},

{
nome:"Coroa da Liderança",
icone:"👑",
modelo:"modelos/coroa.glb",
video:"video5.mp4"
}

];


let atual=0;

let capturados=[];

let segundos=0;

let timer;






start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



let stream=

await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

});



camera.srcObject=stream;



buscar();


};







function buscar(){


scanner.style.display="block";


segundos=0;



let sorteio=

Math.floor(Math.random()*11)+15;




timer=setInterval(()=>{


segundos++;



contador.innerHTML=

"🔍 Procurando... "+segundos+"s";



if(segundos>=sorteio){


clearInterval(timer);


aparecer();


}



},1000);


}







function aparecer(){



scanner.style.display="none";



let item=itens[atual];



objeto.src=item.modelo;



objeto.style.display="block";



objeto.style.left=

Math.random()*50+20+"%";



objeto.style.top=

Math.random()*40+20+"%";



mensagem.innerHTML=

"✨ Habilidade encontrada!<br>Toque para capturar";



mensagem.style.display="block";



navigator.vibrate?.(300);


}








objeto.onclick=()=>{



let item=itens[atual];



capturados.push(item);



objeto.style.display="none";


mensagem.style.display="none";



atualizar();



abrirVideo(item.video);


};








function abrirVideo(v){



playerVideo.style.display="block";


videoSkill.src=v;


videoSkill.play();




videoSkill.onended=()=>{


playerVideo.style.display="none";


videoSkill.src="";



atual++;



if(atual>=5){


fim();


}

else{


buscar();


}


};


}








function atualizar(){



let html="";


itens.forEach(i=>{


html +=

capturados.includes(i)

?

i.icone+"<br>"

:

"⬜<br>";


});



slots.innerHTML=html;


contador.innerHTML=

capturados.length+"/5 habilidades";


}







function fim(){


mensagem.innerHTML=

"🏆 Parabéns!<br>Você conquistou todas as habilidades empreendedoras 🚀";



mensagem.style.display="block";


}



</script>



</body>


</html>
