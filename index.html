<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jornada Empreendedora AR</title>
<link rel="stylesheet" href="css/style.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>
<script defer src="js/jornadas.js"></script>
<script defer src="js/app.js"></script>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<section id="inicio">
<h1>🚀 Jornada Empreendedora</h1>
<p>Explore o ambiente, encontre artefatos escondidos e desbloqueie novas habilidades.</p>
<button id="btnStart">COMEÇAR MISSÃO</button>
</section>

<section id="jogo">

<div id="status">
Preparando missão...
</div>

<div id="sinal"></div>

<div id="radar"></div>

<div id="inventario">
<h3>SKILLS</h3>
<div id="slots"></div>
</div>

</section>


<model-viewer
id="objeto"
auto-rotate
rotation-per-second="30deg"
interaction-prompt="none"
disable-zoom>
</model-viewer>


<div id="msg"></div>


<section id="videoBox">
<video
id="videoSkill"
playsinline
controls>
</video>
</section>


<section id="perfil">

<h2>🚀 Escolha sua Jornada</h2>

<p>
Agora vamos personalizar sua experiência.
</p>

<input
id="nome"
type="text"
placeholder="Seu nome">


<select id="tipo">

<option value="">
Selecione seu perfil
</option>

<option value="empreendedor">
🚀 Tenho ou quero abrir um negócio
</option>

<option value="profissional">
👔 Quero crescer profissionalmente
</option>

<option value="estudante">
🎓 Estou começando minha carreira
</option>

</select>


<button id="btnPerfil">
CONTINUAR
</button>

</section>



<section id="lead">

<h2>🏆 Jornada Concluída</h2>

<p>
Receba mais conteúdos e oportunidades do evento.
</p>


<input
id="fone"
type="tel"
placeholder="WhatsApp">


<button id="btnLead">
RECEBER CONTEÚDOS 🚀
</button>

</section>



<div id="debug"></div>



<audio
id="sndFound"
src="audio/found.mp3">
</audio>


<audio
id="sndCapture"
src="audio/capture.mp3">
</audio>


</body>
</html>
