<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Jornada Empreendedora AR</title>


<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>


<style>


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:black;

}



/* CAMERA */

#camera{

position:fixed;

top:0;
left:0;

width:100vw;
height:100vh;

object-fit:cover;

z-index:1;

}




canvas{

position:fixed;

top:0;

left:0;

z-index:2;

}





/* INICIO */


#inicio{


position:fixed;

inset:0;


background:

linear-gradient(
140deg,
#07182f,
#0a4d68,
#ffb703
);


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


text-align:center;


color:white;


padding:30px;


z-index:1000;


}



#inicio h1{

font-size:35px;

}



#start{

padding:20px 45px;

border:none;

border-radius:50px;

background:#00ff99;

font-size:22px;

font-weight:bold;

}







/* HUD */


#hud{

display:none;

}




#contador{

position:fixed;

top:25px;

left:50%;

transform:translateX(-50%);

background:#0009;

color:white;

padding:15px 30px;

border-radius:30px;

font-size:18px;

z-index:20;

}




#inventario{

position:fixed;

right:15px;

top:90px;

background:#0009;

border:3px solid gold;

color:white;

padding:15px;

border-radius:25px;

font-size:32px;

z-index:20;

}




#msg{


position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:85%;

background:#000c;

color:white;

padding:25px;

border-radius:30px;

font-size:22px;

text-align:center;

display:none;

z-index:30;


}


</style>


</head>


<body>





<video

id="camera"

autoplay

playsinline

webkit-playsinline>

</video>








<div id="inicio">


<h1>

🚀 Jornada Empreendedora

</h1>



<p>

Explore o ambiente e encontre as habilidades escondidas

</p>



<h2>

🧭 💎 🚀 💡 👑

</h2>



<button id="start">

COMEÇAR MISSÃO

</button>


</div>








<div id="hud">


<div id="contador">

🚀 0/5 habilidades

</div>




<div id="inventario">


🎒


<div id="slots">


⬜<br>

⬜<br>

⬜<br>

⬜<br>

⬜


</div>


</div>



<div id="msg"></div>


</div>









<script>


let cena;

let camera3d;

let renderer;


let objetoAtual=null;

let indiceAtual=0;


let capturados=[];






const itens=[


{

nome:"Bússola da Estratégia",

icone:"🧭",

arquivo:"modelos/bussola.glb",

min:15000,

max:30000

},



{

nome:"Cristal Financeiro",

icone:"💎",

arquivo:"modelos/cristal.glb",

min:45000,

max:60000

},



{

nome:"Foguete das Vendas",

icone:"🚀",

arquivo:"modelos/foguete.glb",

min:75000,

max:90000

},



{

nome:"Lâmpada da Inovação",

icone:"💡",

arquivo:"modelos/lampada.glb",

min:105000,

max:120000

},



{

nome:"Coroa da Liderança",

icone:"👑",

arquivo:"modelos/coroa.glb",

min:135000,

max:150000

}


];








start.onclick=async()=>{


inicio.style.display="none";


hud.style.display="block";



await iniciarCamera();



iniciar3D();



agendarObjeto();



};









async function iniciarCamera(){



let stream=

await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment"

},

audio:false


});




document

.querySelector("#camera")

.srcObject=stream;



}









function iniciar3D(){



cena=new THREE.Scene();



camera3d=new THREE.PerspectiveCamera(

70,

innerWidth/innerHeight,

0.01,

100

);



camera3d.position.z=5;




renderer=new THREE.WebGLRenderer({

alpha:true,

antialias:true

});



renderer.setSize(

innerWidth,

innerHeight

);



document.body.appendChild(

renderer.domElement

);




let luz=

new THREE.HemisphereLight(

0xffffff,

0x444444,

3

);



cena.add(luz);



animar();



}










function agendarObjeto(){



if(

indiceAtual>=itens.length

)

return;




let item=

itens[indiceAtual];




let tempo=

Math.floor(

Math.random() *

(item.max-item.min)

+

item.min

);



setTimeout(()=>{


mostrarObjeto(

indiceAtual

);


},tempo);



}










function mostrarObjeto(i){



let loader=

new THREE.GLTFLoader();



loader.load(


itens[i].arquivo,


(gltf)=>{



objetoAtual=gltf.scene;



objetoAtual.scale.set(

2,2,2

);




// posição aleatória


objetoAtual.position.set(


(Math.random()*4)-2,


(Math.random()*2)-1,


0


);




cena.add(

objetoAtual

);





msg.innerHTML=

"✨ Uma habilidade apareceu!<br>Toque nela para capturar";



msg.style.display="block";



if(navigator.vibrate)

navigator.vibrate(300);



}


);



}









window.onclick=()=>{



if(

!objetoAtual

)

return;





capturar();




};










function capturar(){



let item=

itens[indiceAtual];




cena.remove(

objetoAtual

);



objetoAtual=null;




capturados.push(

item

);




msg.innerHTML=

"🎉 Você conquistou<br>"+

item.icone+

"<br>"+

item.nome;



setTimeout(()=>{


msg.style.display="none";


},2000);




atualizar();




indiceAtual++;



if(

indiceAtual<itens.length

){


agendarObjeto();


}

else{


setTimeout(()=>{


msg.innerHTML=

"🏆 Parabéns!<br>Você completou sua Jornada Empreendedora 🚀";


msg.style.display="block";


},2500);


}



}








function atualizar(){



let html="";



itens.forEach(

(x,i)=>{



html +=

capturados.includes(x)

?

x.icone+"<br>"

:

"⬜<br>";



});




slots.innerHTML=html;



contador.innerHTML=

"🚀 "+capturados.length+"/5 habilidades";



}








function animar(){


requestAnimationFrame(

animar

);



if(objetoAtual){



objetoAtual.rotation.y+=0.01;



}



renderer.render(

cena,

camera3d

);



}




</script>


</body>


</html>
