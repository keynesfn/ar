<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jornada AR</title>


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>



<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:Arial;

background:#000;

}



video,
canvas,
.a-canvas{

position:fixed!important;

top:0!important;
left:0!important;

width:100vw!important;

height:100vh!important;

object-fit:cover!important;

}



/* INTRO */


#intro{

position:fixed;

inset:0;

background:black;

z-index:10000;

display:flex;

align-items:center;

justify-content:center;

}



#introVideo{

width:100%;

height:100%;

object-fit:cover;

}



#btnStart{

position:absolute;

bottom:60px;


padding:20px 40px;

border-radius:40px;

border:0;

background:#ffcc00;

font-size:22px;

font-weight:bold;

}




/* HUD */


#hud{

display:none;

}



#progresso{

position:fixed;

top:20px;

left:20px;

z-index:999;


background:#000000aa;

color:white;

padding:15px 25px;

border-radius:25px;

}




#inventario{

position:fixed;

top:20px;

right:20px;

z-index:999;


background:#000000aa;

color:white;

padding:15px;

border-radius:20px;

font-size:30px;

text-align:center;

}





#alerta{

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

width:80%;

background:#000000dd;

color:white;

padding:25px;

border-radius:25px;

text-align:center;

font-size:22px;

display:none;

z-index:999;

}




#scanner{

position:fixed;

inset:0;

border:8px solid #00ff88;

display:none;

z-index:800;

box-sizing:border-box;

pointer-events:none;

animation:pulse 1s infinite;

}


@keyframes pulse{

50%{opacity:.3;}

}


</style>


</head>

<body>



<!-- INTRO -->

<div id="intro">


<video

id="introVideo"

src="intro.mp4"

playsinline

webkit-playsinline>

</video>



<button id="btnStart">

▶️ Começar

</button>


</div>





<div id="hud">


<div id="scanner"></div>



<div id="progresso">

🚀 Jornada 0/5

</div>



<div id="inventario">

🎒

<div id="slots">

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>

</div>


<div id="alerta"></div>


</div>





<!-- AR -->


<a-scene

id="scene"


mindar-image="
imageTargetSrc: ./targets.mind;
autoStart:false;
"


embedded


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"


>


<a-camera

position="0 0 0"

look-controls="enabled:false">


</a-camera>




<a-entity id="item0" mindar-image-target="targetIndex:0">

<a-text value="🧭" scale="3 3 3"></a-text>

</a-entity>



<a-entity id="item1" mindar-image-target="targetIndex:1">

<a-text value="💰" scale="3 3 3"></a-text>

</a-entity>




<a-entity id="item2" mindar-image-target="targetIndex:2">

<a-text value="🚀" scale="3 3 3"></a-text>

</a-entity>




<a-entity id="item3" mindar-image-target="targetIndex:3">

<a-text value="💡" scale="3 3 3"></a-text>

</a-entity>




<a-entity id="item4" mindar-image-target="targetIndex:4">

<a-text value="👑" scale="3 3 3"></a-text>

</a-entity>


</a-scene>





<script>


const itens=[

["Bússola da Estratégia","🧭"],

["Cristal Financeiro","💰"],

["Foguete das Vendas","🚀"],

["Lâmpada da Inovação","💡"],

["Coroa da Liderança","👑"]

];



let encontrado=null;

let capturados=[];




const video=

document.querySelector("#introVideo");



const scene=

document.querySelector("#scene");





document

.querySelector("#btnStart")

.onclick=()=>{


document.querySelector("#btnStart")

.style.display="none";



video.play();



video.onended=async()=>{


document.querySelector("#intro")

.style.display="none";



document.querySelector("#hud")

.style.display="block";




await scene.systems[

"mindar-image-system"

].start();



};


};









for(let i=0;i<5;i++){


let obj=

document.querySelector("#item"+i);




obj.addEventListener(

"targetFound",

()=>{


encontrado=i;



document.querySelector("#scanner")

.style.display="block";



mostrar(

"✨ Encontrado ✨<br><br>"+

"<span style='font-size:70px'>"+

itens[i][1]+

"</span><br>"+

itens[i][0]+

"<br><br>Toque para capturar"

);


});


}




window.onclick=()=>{


if(encontrado===null)

return;




if(

capturados.includes(encontrado)

)

return;



capturados.push(encontrado);



atualizar();



mostrar(

"🎉 Capturado<br>"+

itens[encontrado][1]

);



encontrado=null;



if(capturados.length==5){


setTimeout(()=>{


mostrar(

"🏆 Jornada completa 🚀"

);


},1500);


}


};







function atualizar(){


let html="";


itens.forEach((x,i)=>{


html+=

capturados.includes(i)

?

x[1]+"<br>"

:

"⬜<br>";


});



document.querySelector("#slots")

.innerHTML=html;




document.querySelector("#progresso")

.innerHTML=

"🚀 Jornada "+capturados.length+"/5";


}







function mostrar(t){


let a=

document.querySelector("#alerta");


a.innerHTML=t;


a.style.display="block";


}



</script>


</body>


</html>
