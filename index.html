<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPG AR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:Arial;

}


/* força câmera AR ocupar tudo */

.a-canvas,
canvas,
video{

    position:fixed !important;

    top:0 !important;
    left:0 !important;

    width:100vw !important;
    height:100vh !important;

    object-fit:cover !important;

}



/* força cena AR */

a-scene{

    position:fixed !important;

    top:0;
    left:0;

    width:100vw !important;
    height:100vh !important;

}





#inventario{

    position:fixed;

    top:20px;
    right:20px;

    background:white;

    padding:15px;

    border-radius:15px;

    font-size:28px;

    z-index:9999;

    box-shadow:0 0 15px #333;

}





#alerta{

    position:fixed;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

    width:80%;

    background:white;

    padding:20px;

    border-radius:20px;

    text-align:center;

    font-size:24px;

    display:none;

    z-index:9999;

}






#scanner{

    position:fixed;

    top:0;

    left:0;

    width:100vw;

    height:100vh;


    border:10px solid #00ff00;

    box-sizing:border-box;

    display:none;

    animation:pulse 1s infinite;

    pointer-events:none;

    z-index:9998;

}





@keyframes pulse{


0%{

opacity:.2;

}


50%{

opacity:1;

}


100%{

opacity:.2;

}


}



</style>


</head>




<body>



<div id="scanner"></div>




<div id="inventario">

🎒<br>

⬜<br>
⬜<br>
⬜<br>
⬜<br>
⬜

</div>




<div id="alerta">

</div>






<a-scene


mindar-image="imageTargetSrc: ./targets.mind;"


embedded


color-space="sRGB"


renderer="colorManagement:true"


vr-mode-ui="enabled:false"


device-orientation-permission-ui="enabled:false"


>





<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>







<a-entity id="item0"

mindar-image-target="targetIndex:0">


<a-text

value="🐶"

position="0 0 0"

scale="3 3 3"

align="center">


</a-text>


</a-entity>






<a-entity id="item1"

mindar-image-target="targetIndex:1">


<a-text

value="🐱"

position="0 0 0"

scale="3 3 3"

align="center">


</a-text>


</a-entity>








<a-entity id="item2"

mindar-image-target="targetIndex:2">


<a-text

value="🦆"

position="0 0 0"

scale="3 3 3"

align="center">


</a-text>


</a-entity>








<a-entity id="item3"

mindar-image-target="targetIndex:3">


<a-text

value="🦁"

position="0 0 0"

scale="3 3 3"

align="center">


</a-text>


</a-entity>








<a-entity id="item4"

mindar-image-target="targetIndex:4">


<a-text

value="🐵"

position="0 0 0"

scale="3 3 3"

align="center">


</a-text>


</a-entity>





</a-scene>









<script>



const animais=[


{
nome:"Guardião da Liderança",
icone:"🐶"
},


{
nome:"Guardião das Vendas",
icone:"🐱"
},


{
nome:"Guardião da Estratégia",
icone:"🦆"
},


{
nome:"Guardião da Inovação",
icone:"🦁"
},


{
nome:"Guardião Financeiro",
icone:"🐵"
}


];




let encontrado=null;


let capturados=[];






for(

let i=0;

i<5;

i++

){


const item=

document.querySelector(

"#item"+i

);





item.addEventListener(


"targetFound",


()=>{



encontrado=i;



destacarItem(

animais[i]

);



}




);





item.addEventListener(


"targetLost",


()=>{


document

.querySelector("#scanner")

.style.display="none";



}




);




}









function destacarItem(animal){



document

.querySelector("#scanner")

.style.display="block";




let alerta=

document.querySelector(

"#alerta"

);



alerta.style.display="block";



alerta.innerHTML=


"✨ ITEM ENCONTRADO ✨<br><br>"+


animal.icone+

"<br>"+

animal.nome+

"<br><br>👇 Toque para capturar";




if(

navigator.vibrate

){

navigator.vibrate(

300

);

}




}









window.addEventListener(

"click",


()=>{



if(encontrado===null)

return;




if(

capturados.includes(

encontrado

)

)

return;





capturados.push(

encontrado

);




mostrar(

"🎉 Parabéns!<br><br>Você capturou:<br>"+


animais[encontrado].icone+

"<br>"+

animais[encontrado].nome+

"<br><br>Seja feliz por aí 🚀"

);



atualizar();



document

.querySelector("#scanner")

.style.display="none";



encontrado=null;






if(

capturados.length===5

){



setTimeout(()=>{


mostrar(

"🏆 PARABÉNS!<br><br>Você encontrou todos os guardiões.<br><br>Você é um empreendedor foda pra caralho 🚀🔥"


);



},2000);



}




}



);









function atualizar(){



let html="🎒<br>";



animais.forEach(

(a,i)=>{



html +=

capturados.includes(i)

?

a.icone+"<br>"

:

"⬜<br>";



});


document

.querySelector("#inventario")

.innerHTML=html;



}








function mostrar(texto){



let alerta=

document.querySelector(

"#alerta"

);



alerta.innerHTML=texto;


alerta.style.display="block";




setTimeout(()=>{


alerta.style.display="none";


},


4000

);


}



</script>



</body>


</html>
