<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jornada Empreendedora AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin:0;
            overflow:hidden;
            font-family:Arial;
        }
        #painel {
            position:fixed;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);

            background:white;
            padding:20px;
            border-radius:15px;

            display:none;

            width:80%;
            text-align:center;

            font-size:22px;
            z-index:10;

            box-shadow:0 0 20px #333;

        }


        #inventario {

            position:fixed;
            top:20px;
            left:20px;

            background:white;

            padding:10px;
            border-radius:10px;

            z-index:10;

        }

    </style>


</head>


<body>



<div id="inventario">

    🎒 Inventário<br>
    <span id="skill">
        ⬜ Liderança
    </span>

</div>



<div id="painel">

    🎉 Parabéns!<br><br>

    Você encontrou:<br>

    <b>⭐ Skill Liderança Empreendedora</b>

</div>




<a-scene embedded arjs>


    <!-- marcador padrão HIRO -->

    <a-marker preset="hiro" id="marcador">


        <!-- objeto 3d simples -->

        <a-box

            position="0 0.5 0"

            color="gold"

            rotation="0 45 0"

            animation="
            property: rotation;
            to:0 405 0;
            loop:true;
            dur:3000">


        </a-box>


        <a-text

            value="LIDERANCA"

            position="-1 1.3 0"

            color="yellow"

            scale="1 1 1">

        </a-text>


    </a-marker>



    <a-entity camera></a-entity>


</a-scene>



<script>


const marcador = document.querySelector("#marcador");


marcador.addEventListener("markerFound",()=>{


    document
    .getElementById("painel")
    .style.display="block";


    document
    .getElementById("skill")
    .innerHTML="✅ Liderança";


    localStorage.setItem(
        "lideranca",
        "capturada"
    );


});



window.onload=()=>{


    if(
        localStorage.getItem("lideranca")
    ){

        document
        .getElementById("skill")
        .innerHTML="✅ Liderança";

    }


}



</script>



</body>

</html>
