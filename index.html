<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>
Jornada Empreendedora AR
</title>


<style>

body{
 margin:0;
 overflow:hidden;
 font-family:Arial;
}


#hud{

 position:fixed;
 top:20px;
 left:20px;

 background:white;

 padding:15px;

 border-radius:15px;

 z-index:10;

 font-size:16px;

}


#capture{

 position:fixed;

 bottom:40px;

 left:50%;

 transform:translateX(-50%);

 padding:20px 40px;

 border-radius:30px;

 border:none;

 font-size:22px;

 display:none;

 z-index:20;

}


</style>


</head>



<body>


<div id="hud">

🎒 Inventário

<br><br>

<div id="lista">

⬜ Finanças<br>
⬜ Vendas<br>
⬜ Liderança<br>
⬜ Estratégia<br>
⬜ Inovação

</div>

</div>



<button id="capture">

Capturar ⭐

</button>





<script type="module">


import * as THREE
from 
'https://unpkg.com/three@0.160.0/build/three.module.js';



import {ARButton}

from 

'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';





let camera;

let scene;

let renderer;


let alvoAtual=null;



const skills=[


{
nome:"Finanças",
icone:"💰"
},


{
nome:"Vendas",
icone:"🚀"
},


{
nome:"Liderança",
icone:"👑"
},


{
nome:"Estratégia",
icone:"🧭"
},


{
nome:"Inovação",
icone:"💡"
}


];



const capturadas=[];


const objetos=[];




init();




function init(){


scene=new THREE.Scene();



camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);



renderer=new THREE.WebGLRenderer(
{
antialias:true,
alpha:true
}
);


renderer.setSize(
window.innerWidth,
window.innerHeight
);


renderer.xr.enabled=true;


document.body.appendChild(
renderer.domElement
);



document.body.appendChild(


ARButton.createButton(
renderer,
{
requiredFeatures:[]
}
)

);




const luz = new THREE.HemisphereLight(
0xffffff,
0xbbbbff,
3
);


scene.add(luz);



renderer.xr.addEventListener(

"sessionstart",

()=>{


criarSkills();


}

);



renderer.setAnimationLoop(
loop
);


}




function criarSkills(){



skills.forEach(

(skill,index)=>{


const geometria=

new THREE.SphereGeometry(
0.25,
32,
32
);



const material=

new THREE.MeshStandardMaterial(
{
color:0xffcc00
}
);



const esfera=

new THREE.Mesh(
geometria,
material
);



const angulo=

Math.random()
*
Math.PI
*
2;



const distancia=

2+
Math.random()*3;



esfera.position.set(

Math.cos(angulo)
*
distancia,

0,


Math.sin(angulo)
*
distancia

);



esfera.userData.skill=skill.nome;



scene.add(esfera);



objetos.push(esfera);



}


);


}






function loop(){



objetos.forEach(

obj=>{


obj.rotation.y +=0.02;



const distancia=

camera.position.distanceTo(
obj.position
);



if(

distancia < 1
&&
!capturadas.includes(
obj.userData.skill
)

){

alvoAtual=obj;


document
.getElementById("capture")
.style.display="block";


}



}


);



renderer.render(
scene,
camera
);



}






document
.getElementById("capture")
.onclick=

()=>{


if(!alvoAtual)return;



const nome=

alvoAtual.userData.skill;



capturadas.push(nome);



scene.remove(
alvoAtual
);



atualizarInventario();



document
.getElementById("capture")
.style.display="none";



alvoAtual=null;



};







function atualizarInventario(){


let html="";



skills.forEach(

s=>{


html+=

(
capturadas.includes(
s.nome
)

?

"✅ "

:

"⬜ "

)

+

s.nome

+

"<br>";


}

);


document
.getElementById("lista")
.innerHTML=html;




if(
capturadas.length===5
){


alert(
"🏆 Parabéns! Você completou a Jornada Empreendedora!"
);


}


}



</script>



</body>


</html>
